<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── DATA ───
// All course data is inline below.
// The separate .js files (cse450-data.js, etc.) are for sharing with Claude in new chats.
// See ADDING_CONTENT.md for how to add content.
const COURSES = {
  cse450: {
    code: "CSE 450",
    name: "Design & Analysis of Algorithms",
    prof: "Prof. Daymude",
    color: "#93c5fd",
    storagePrefix: "cse450_study_",
    modules: [
  {
    id: "m1", label: "Module 1", subtitle: "Stable Matching", color: "#6ee7b7",
    flashcards: [
      { q: 'What is a problem (in the context of this course)?', a: 'The "nail" — a formal specification of inputs and desired outputs. It defines what you want to solve, not how.' },
      { q: 'What is an algorithm?', a: 'The "hammer" — a step-by-step procedure that solves a problem. It defines how to solve it.' },
      { q: 'What does it mean to analyze an algorithm?', a: 'Proving it is correct (produces the right output for all inputs) and determining its efficiency (time and space complexity).' },
      { q: 'What is a matching?', a: 'A 1:1 assignment between two sets — each element is paired with at most one element from the other set.' },
      { q: 'What is a perfect matching?', a: 'A matching where every element in both sets A and B is matched to exactly one partner. No one is left unmatched.' },
      { q: 'What is an unstable pair (blocking pair)?', a: "A pair (a, b') where a prefers b' over their current partner AND b' prefers a over their current partner. Both sides must mutually prefer each other." },
      { q: 'What is a stable matching?', a: 'A perfect matching with no unstable pairs.' },
      { q: 'What is the formal definition of the Stable-Matching problem?', a: 'Input: sets A = {a\u2081,...,a\u2099} and B = {b\u2081,...,b\u2099} with strictly-ordered preference rankings for each element. Goal: find a perfect, stable matching between A and B.' },
      { q: 'What is the Gale-Shapley algorithm also called?', a: 'The "propose-and-reject" algorithm or the "deferred acceptance" algorithm.' },
      { q: 'Describe the Gale-Shapley algorithm in plain English.', a: "While there's an unmatched proposer who hasn't proposed to everyone: that proposer proposes to their top remaining choice. If the acceptor is unmatched, they accept. If matched, they accept only if they prefer the new proposer over their current partner (trading up), otherwise they reject." },
      { q: 'In Gale-Shapley, who proposes and who accepts/rejects?', a: 'Elements in A propose. Elements in B accept or reject. B never proposes.' },
      { q: 'What is the "Offer Order" observation?', a: 'Elements in A make offers to elements in B in decreasing order of preference. They always propose to their most-preferred remaining option.' },
      { q: 'What is the "Trading Up" observation?', a: 'Once an element in B accepts an offer, it never becomes unmatched again. It can only swap to a higher-preference partner.' },
      { q: 'Can an element in A propose to the same element in B more than once?', a: 'No. Each a \u2208 A proposes to each b \u2208 B at most once. The algorithm always moves to the next person on the list.' },
      { q: 'What three things must be shown to prove Gale-Shapley is correct?', a: '(1) Termination — the algorithm eventually stops. (2) Perfect matching — everyone is matched. (3) Stability — no unstable pairs exist.' },
      { q: 'How is termination proved?', a: 'Each while loop iteration uses a unique (a, b) proposal. There are at most n \u00d7 n = n\u00b2 possible proposals, so the algorithm must terminate in at most n\u00b2 iterations.' },
      { q: 'How is perfect matching proved?', a: "By contradiction. Suppose some a \u2208 A is unmatched at termination. Then some b \u2208 B must also be unmatched. By Trading Up, b is only unmatched if no one ever proposed to b. But for the algorithm to terminate, a must have proposed to everyone, including b. Contradiction." },
      { q: 'How is stability proved? (Case 1)', a: "Suppose (a, b) and (a', b') are in the matching and a prefers b' over b. Case 1: a never proposed to b'. Since a proposed to b, and proposals go in decreasing preference order, a must prefer b over b'. Contradiction." },
      { q: 'How is stability proved? (Case 2)', a: "Case 2: a did propose to b'. Since a ended up with b instead, b' must have either rejected a or accepted then traded up. By Trading Up, b' prefers a' (her final partner) over a. Contradiction." },
      { q: 'What is the runtime of the na\u00efve Gale-Shapley implementation?', a: 'O(n\u00b3). At most n\u00b2 iterations, each taking O(n) to scan for an unmatched proposer, find next proposal target, and check acceptor\'s preferences.' },
      { q: 'What is the runtime of the efficient Gale-Shapley implementation?', a: 'O(n\u00b2). At most n\u00b2 iterations, each taking O(1) using proper data structures.' },
      { q: 'What is the space complexity of efficient Gale-Shapley?', a: 'O(n\u00b2) — dominated by the preference arrays.' },
      { q: 'What data structures does the efficient implementation use?', a: '(1) Queue Q of unmatched elements in A. (2) Matching variables m(a\u1d62) and m(b\u1d62). (3) Offer counters c(a\u1d62) tracking how many proposals a\u1d62 has made. (4) Preference arrays p(a\u1d62) in preference order and inverse arrays p\u207b\u00b9(b\u1d62) in element order for O(1) comparison.' },
      { q: 'What does the inverse preference array p\u207b\u00b9(b\u1d62) do?', a: "It stores b\u1d62's preferences in element order (not rank order), so you can compare two proposers in O(1). Instead of scanning b's whole list, you just look up p\u207b\u00b9(b\u1d62)[a] and p\u207b\u00b9(b\u1d62)[a'] and compare." },
      { q: "Why can't we avoid the n\u00b2 loop iterations?", a: 'Because in the worst case, every proposer may need to propose to many acceptors before finding a match. The n\u00b2 iterations are inherent to the problem. We can only optimize the cost per iteration.' },
      { q: 'What are the five representative problems and their design paradigms?', a: 'Interval-Scheduling \u2192 Greedy. Weighted-Interval-Scheduling \u2192 Dynamic Programming. Bipartite-Matching \u2192 Network Flows. Maximum-Independent-Set \u2192 Randomized & Approximation. Competitive-Facility-Location \u2192 Heuristics.' },
      { q: 'What are the time complexities of the five representative problems?', a: 'Interval-Scheduling: O(n log n). Weighted-Interval-Scheduling: O(n log n). Bipartite-Matching: O(mn). Maximum-Independent-Set: NP-complete. Competitive-Facility-Location: PSPACE-complete.' },
      { q: 'What is the unifying theme of the five representative problems?', a: 'They are all variations on independent sets — selecting items subject to conflict constraints (non-overlapping intervals, non-adjacent nodes, non-sharing edges, etc.).' },
      { q: 'What is the Interval-Scheduling problem?', a: 'Input: n jobs with start and end times. Goal: find a maximum cardinality subset of non-overlapping jobs.' },
      { q: 'What is Weighted-Interval-Scheduling?', a: 'Input: n jobs with start times, end times, and weights. Goal: find a maximum weight subset of non-overlapping jobs.' },
      { q: 'What is the Bipartite-Matching problem?', a: 'Input: undirected bipartite graph with n nodes and m edges. Goal: find a maximum cardinality set of edges such that no two share an endpoint.' },
      { q: 'What is the Maximum-Independent-Set problem?', a: 'Input: undirected graph with n nodes and m edges. Goal: find a maximum cardinality set of nodes such that no two are joined by an edge.' },
      { q: "Why can't Maximum-Independent-Set be solved efficiently?", a: "It's NP-complete — no known polynomial-time algorithm exists for it." },
      { q: 'Why is Competitive-Facility-Location harder than Maximum-Independent-Set?', a: "It's PSPACE-complete (believed harder than NP-complete) because it involves a two-player game with adversarial turns, not just a single optimization." },
      { q: 'What are the four main algorithm design paradigms in CSE 450?', a: '(1) Greedy — build solutions incrementally, always taking the locally best next step. (2) Divide and Conquer — break into independent subproblems, solve, combine. (3) Dynamic Programming — break into overlapping subproblems, build up solutions. (4) Network Flows and Matchings — general graph-based approaches.' },
      { q: 'Do these paradigms always yield fast algorithms?', a: 'No. The slides state they "often — but not always" yield fast algorithms.' },
    ],
    trueFalse: [
      { s: "A stable matching is any 1:1 assignment of elements in A to elements in B with no unstable pairs.", ans: false, e: "It must also be a perfect matching \u2014 every element in A and B must be matched. A matching with no unstable pairs but unmatched elements doesn't satisfy the Stable-Matching problem definition." },
      { s: "In Gale-Shapley, elements in B (the acceptors) make offers to elements in A in decreasing order of preference.", ans: false, e: "It's the other way around. Elements in A (the proposers) make offers to elements in B in decreasing order of preference. B elements only accept or reject \u2014 they never propose." },
      { s: "The Gale-Shapley algorithm terminates in at most n\u00b2 while loop iterations.", ans: true, e: "Each iteration involves some a \u2208 A proposing to a b \u2208 B it hasn't proposed to before. There are n elements in A and n in B, so at most n \u00d7 n = n\u00b2 possible proposals." },
      { s: "Once an element in B accepts an offer in Gale-Shapley, it remains matched for the rest of the algorithm (though its partner may change).", ans: true, e: "This is the \u201cTrading Up\u201d observation. Once a b \u2208 B gets matched, it never becomes unmatched \u2014 it can only swap to a more preferred partner." },
      { s: "A na\u00efve implementation of Gale-Shapley runs in O(n\u00b2) time.", ans: false, e: "The na\u00efve implementation runs in O(n\u00b3). There are at most n\u00b2 iterations, and each takes O(n) to scan for an unmatched proposer, find the next person to propose to, and check preferences. The efficient implementation (queues, counters, inverse arrays) gets each iteration to O(1), bringing total time to O(n\u00b2)." },
      { s: "Using the L2 running example, when a\u2082 first proposes to b\u2085, b\u2085 accepts the offer because b\u2085 is unmatched.", ans: false, e: "When a\u2082 proposes to b\u2085, b\u2085 is already matched to a\u2081 (who proposed first). b\u2085 prefers a\u2081 over a\u2082, so b\u2085 rejects a\u2082." },
      { s: "In the stability proof for Gale-Shapley, if the final matching contains (a, b) and a never proposed to b', then a must prefer b over b'.", ans: true, e: "This is Case 1 of the stability proof. Since proposers propose in decreasing preference order and a ended up matched to b, if a never proposed to b', that means b' was lower on a's list than b." },
      { s: "The Interval-Scheduling problem is solved optimally using Dynamic Programming.", ans: false, e: "Interval-Scheduling (maximize number of non-overlapping jobs) is solved with a Greedy algorithm in O(n log n). It's Weighted-Interval-Scheduling that requires Dynamic Programming." },
      { s: "The Maximum-Independent-Set problem is NP-complete.", ans: true, e: "Stated directly on the Five Representative Problems summary slide. No known polynomial-time algorithm exists for it." },
      { s: "The five representative problems from L3 are all variations on the theme of independent sets.", ans: true, e: "Interval-Scheduling picks non-overlapping intervals, Bipartite-Matching picks non-sharing edges, Maximum-Independent-Set picks non-adjacent nodes, etc. They're all about selecting items subject to conflict constraints." },
      { s: "An efficient implementation of Gale-Shapley uses O(n\u00b2) space and runs in O(n\u00b2) time.", ans: true, e: "The efficient version uses a queue Q for unmatched proposers, matching variables, offer counters, preference arrays p(a\u1d62), and inverse preference arrays p\u207b\u00b9(b\u1d62). The preference arrays alone take O(n\u00b2) space. Runtime is O(n\u00b2) because each of the at most n\u00b2 iterations runs in O(1)." },
      { s: "In Gale-Shapley, an element in A can propose to the same element in B more than once.", ans: false, e: "Each proposer a \u2208 A proposes to each b \u2208 B at most once. The algorithm tracks this \u2014 a always proposes to the next person on their list they haven't proposed to yet. This is also why termination is guaranteed." },
      { s: "A perfect matching requires that every element in both A and B is matched to exactly one partner.", ans: true, e: "That's the definition. Perfect = 1:1, covering all elements on both sides. No one is left unmatched." },
      { s: "An unstable pair (a, b') exists when a prefers b' over their current partner AND b' prefers a over their current partner.", ans: true, e: "This is the definition of an unstable pair (blocking pair). Both sides must mutually prefer each other over their current assignments. If only one side prefers the switch, it's not unstable." },
      { s: "The Weighted-Interval-Scheduling problem has time complexity O(n log n) and is solved using a greedy algorithm.", ans: false, e: "While the time complexity O(n log n) is correct, it's solved using Dynamic Programming, not Greedy. The weights make a greedy approach fail \u2014 a long high-weight job might be better than several short low-weight ones." },
      { s: "Bipartite-Matching runs in O(mn) time and is solved using Network Flows.", ans: true, e: "Directly from the L3 summary table." },
      { s: "Competitive-Facility-Location is NP-complete.", ans: false, e: "It's PSPACE-complete, which is believed to be even harder than NP-complete. It's a two-player game, which adds complexity beyond standard optimization." },
      { s: "The Gale-Shapley algorithm's correctness proof requires showing three things: termination, perfect matching, and stability.", ans: true, e: "Slide 16 of L2 explicitly lists these three requirements for proving correctness." },

    flashcards: [
      { q: 'What is the Interval-Scheduling problem?', a: "Given n jobs with start times s(i) and finish times f(i), find a maximum cardinality subset J' \u2286 J such that all pairs of jobs in J' are compatible (non-overlapping)." },
      { q: 'What does "compatible" mean in Interval-Scheduling?', a: 'Two jobs i and j are compatible if their time intervals do not overlap \u2014 i.e., f(i) \u2264 s(j) or f(j) \u2264 s(i).' },
      { q: 'What are four greedy ideas for Interval-Scheduling, and which ones fail?', a: '(1) Earliest Start Time \u2014 FAILS. (2) Earliest Finish Time \u2014 WORKS. (3) Shortest Interval \u2014 FAILS. (4) Fewest Conflicts \u2014 FAILS.' },
      { q: 'Why does Earliest Start Time fail for Interval-Scheduling?', a: 'A single long job that starts earliest blocks many shorter compatible jobs.' },
      { q: 'Why does Shortest Interval fail for Interval-Scheduling?', a: 'A short job in the middle can overlap two longer non-overlapping jobs. Picking it gives 1 job instead of 2.' },
      { q: 'Why does Fewest Conflicts fail for Interval-Scheduling?', a: 'The slides show a specific instance where the job with fewest conflicts is not part of the optimal solution.' },
      { q: 'Describe the Earliest Finish Time algorithm step by step.', a: "(1) Initialize J' \u2190 \u2205. (2) Sort and relabel jobs so f(1) \u2264 f(2) \u2264 ... \u2264 f(n). (3) For each i = 1,...,n: if job i is compatible with J', add i to J'. (4) Return J'." },
      { q: 'What is the naive runtime of the Earliest Finish Time algorithm?', a: "O(n\u00b2) \u2014 sorting is O(n log n), but checking compatibility by comparing against all jobs in J' is O(n) per iteration, giving O(n\u00b2) for the loop." },
      { q: 'What is the efficient runtime of Earliest Finish Time, and what optimization achieves it?', a: "O(n log n). Store only the finish time of the last job added to J' and compare s(i) to f(last). Each check is O(1)." },
      { q: 'What proof technique is used for Earliest Finish Time correctness?', a: 'A staying ahead argument.' },
      { q: 'State the "staying ahead" lemma for Interval-Scheduling.', a: 'Let j\u2081,...,j\u2096 be the greedy jobs and o\u2081,...,o\u2097 be any optimal set, both sorted by finish time. Then for all i \u2264 k, f(j\u1d62) \u2264 f(o\u1d62). The greedy job finishes no later than the corresponding optimal job.' },
      { q: 'Prove the base case of the staying ahead lemma.', a: 'For i = 1: the greedy algorithm picks the job with the globally earliest finish time, so f(j\u2081) = min_j f(j) \u2264 f(o\u2081).' },
      { q: 'What is the key insight in the inductive step of the staying ahead lemma?', a: "By induction, f(j\u1d62\u208b\u2081) \u2264 f(o\u1d62\u208b\u2081). Since o\u1d62\u208b\u2081 and o\u1d62 are compatible, f(o\u1d62\u208b\u2081) \u2264 s(o\u1d62). Combining: f(j\u1d62\u208b\u2081) \u2264 s(o\u1d62), so o\u1d62 is compatible with j\u1d62\u208b\u2081. The algorithm chose j\u1d62 as the next compatible job with earliest finish, so f(j\u1d62) \u2264 f(o\u1d62)." },
      { q: 'State the optimality theorem for Earliest Finish Time.', a: 'The Earliest Finish Time algorithm always returns a maximum cardinality subset of mutually compatible jobs.' },
      { q: 'How does the optimality proof work (final contradiction)?', a: "Assume \u2113 > k. By the lemma, f(j\u2096) \u2264 f(o\u2096). Since o\u2096 and o\u2096\u208a\u2081 are compatible, f(o\u2096) \u2264 s(o\u2096\u208a\u2081), so f(j\u2096) \u2264 s(o\u2096\u208a\u2081). Then o\u2096\u208a\u2081 is compatible with j\u2096, meaning the algorithm wouldn't have stopped at k jobs \u2014 contradiction." },
      { q: 'Does the Earliest Finish Time algorithm ever revert a decision?', a: "No. Once a job is added to J', it is never removed." },
      { q: 'What is the Interval-Partitioning problem?', a: 'Given n jobs with start/finish times, find the smallest number of groups such that every job is assigned to a group and no two jobs in the same group overlap.' },
      { q: 'What is the depth of a set of intervals?', a: 'The largest number of intervals that simultaneously overlap at any point in time.' },
      { q: 'State the Depth Lower Bound observation.', a: 'The number of groups needed to partition J is at least the depth of J.' },
      { q: 'Describe the Earliest Start Time algorithm for Interval-Partitioning.', a: "(1) Initialize G \u2190 \u2205. (2) Sort jobs so s(1) \u2264 s(2) \u2264 ... \u2264 s(n). (3) For each i: if job i is compatible with some group g \u2208 G, add i to g; else create a new group {i}. (4) Return G." },
      { q: 'What is the naive runtime of the Earliest Start Time algorithm for Interval-Partitioning?', a: 'O(n\u00b2) \u2014 for each of n jobs, checking compatibility against all existing groups could take O(n).' },
      { q: 'What data structure makes Interval-Partitioning efficient, and what runtime does it achieve?', a: "A priority queue (min-heap) storing the finish time of the last job in each group. O(log n) checks, O(n log n) total." },
      { q: 'What proof technique is used for Interval-Partitioning correctness?', a: 'Matching lower bounds (also called "structural bound" argument).' },
      { q: 'Walk through the Interval-Partitioning correctness proof.', a: 'Let g = groups created, g* = optimal. When the g-th group was created, some job i was incompatible with all g-1 existing groups. Each of those groups has a job overlapping i. So g jobs overlap at time s(i)+\u03b5, meaning depth \u2265 g. By the lower bound, g* \u2265 depth \u2265 g, so g is minimum.' },
      { q: 'Does the Earliest Start Time algorithm always produce exactly depth(J) groups?', a: 'Yes. The proof shows the algorithm uses at most depth(J) groups, and since depth(J) is a lower bound, it achieves exactly the depth.' },
      { q: 'What is the Minimum-Lateness-Scheduling problem?', a: 'Given n jobs with processing times t(i) and deadlines d(i), and a single worker: order the jobs to minimize the maximum lateness L = max\u1d62 \u2113(i), where \u2113(i) = max{0, f(i) \u2212 d(i)}.' },
      { q: 'What is the lateness of a job?', a: "\u2113(i) = max{0, f(i) \u2212 d(i)}. It's how late the job finishes past its deadline (0 if on time or early)." },
      { q: 'What does the objective L = max\u1d62 \u2113(i) represent?', a: 'The maximum lateness across all jobs. We want the worst-case tardiness to be as small as possible.' },
      { q: 'Why does Shortest Processing Time First fail for Min-Lateness?', a: 'Counterexample: Job 1 has t=1, d=10; Job 2 has t=5, d=5. SPT schedules job 1 first \u2192 L = 1. But scheduling job 2 first \u2192 L = 0.' },
      { q: 'Why does Shortest Slack First fail?', a: 'Counterexample: Job 1 has t=1, d=2; Job 2 has t=10, d=10. Shortest slack = job 2 (slack 0), so it goes first \u2192 L = 9. But job 1 first \u2192 L = 1.' },
      { q: 'Describe the Earliest Deadline First algorithm.', a: '(1) Initialize t \u2190 0. (2) Sort jobs so d(1) \u2264 d(2) \u2264 ... \u2264 d(n). (3) For each i: assign s(i) \u2190 t, f(i) \u2190 t + t(i), update t \u2190 f(i). (4) Return all intervals.' },
      { q: 'What is the runtime of Earliest Deadline First?', a: 'O(n log n) \u2014 dominated by sorting.' },
      { q: 'What proof technique is used for Earliest Deadline First?', a: 'An exchange argument.' },
      { q: 'What is an inversion in the context of Min-Lateness?', a: 'Jobs i and j are inverted if j is scheduled before i but d(i) < d(j) \u2014 the job with the earlier deadline comes later.' },
      { q: 'State the exchange lemma for Min-Lateness.', a: 'Swapping two consecutive, inverted jobs does not increase the maximum lateness.' },
      { q: 'State the optimality theorem for Earliest Deadline First.', a: 'The Earliest Deadline First algorithm achieves minimum maximum lateness.' },
      { q: 'What is the Offline-Caching problem?', a: 'Given n distinct items, a cache of size k < n, and a sequence of m requests: find an eviction schedule that minimizes cache misses.' },
      { q: 'What is the Farthest in the Future eviction strategy?', a: 'On a cache miss, evict whichever cached item is requested farthest in the future.' },
      { q: 'What proof technique is used for Farthest in the Future?', a: 'A (somewhat subtle and complex) exchange argument via induction.' },
      { q: 'What is a reduced eviction schedule?', a: 'A schedule that only loads an item into the cache at the time that item is being requested (never loads items "early").' },
      { q: 'What is LRU eviction?', a: 'Least Recently Used: evict the item accessed longest ago. It is k-competitive.' },
      { q: 'Describe the truck loading problem (PS2 P1).', a: 'Packages arrive in order with weights. A truck holds max weight W. Load packages in order; when the next would exceed W, send the truck. Proved optimal via staying ahead.' },
      { q: 'Describe HappyScheduling (PS2 P2).', a: 'Given n jobs with processing times t\u1d62 and values v\u1d62, minimize \u03a3 v\u1d62f\u1d62. Sort jobs in decreasing order of v\u1d62/t\u1d62. Runtime: O(n log n). Proved via exchange argument.' },
      { q: 'Describe the cell tower problem (PS2 P3).', a: 'Houses at positions on a line, each tower covers distance d. GreedyTower places tower at h\u1d62 + d for each uncovered house. O(n) if pre-sorted. Proved via staying ahead.' },
      { q: 'Name the three proof techniques for greedy correctness.', a: '(1) Staying ahead, (2) Matching lower bounds, (3) Exchange arguments.' },
      { q: 'What is the general structure of a staying ahead argument?', a: "By induction, show that after each step, the greedy solution's measure is at least as good as the optimal's corresponding measure." },
      { q: 'What is the general structure of an exchange argument?', a: 'Take any optimal solution that differs from greedy. Transform it toward greedy (via local swaps) without worsening the objective. Conclude greedy is also optimal.' },
      { q: "What is the input to the Shortest-Path problem?", a: "A directed graph G = (V, E) with edge weights w : E \u2192 \u211d." },
      { q: "What version does Dijkstra's solve?", a: "Single-source Shortest-Path (from one source s to all other nodes)." },
      { q: "What is the key restriction for Dijkstra's?", a: "All edge weights must be nonnegative (w : E \u2192 \u211d\u22650)." },
      { q: "Describe the greedy idea behind Dijkstra's.", a: "Maintain a set S of explored nodes with confirmed shortest distances. At each step, add the unexplored node u with smallest tentative distance d(u), then update neighbors." },
      { q: "What is the runtime of Dijkstra's with a priority queue?", a: "O(n log n + m), where n = |V| and m = |E|." },
      { q: "What proof technique is used for Dijkstra's correctness?", a: "Induction on |S|, the number of explored nodes." },
      { q: "Why does Dijkstra's proof require nonnegative weights?", a: "The sub-path from y to v must have nonneg length. Negative edges could decrease the total, breaking the inequality chain." },
      { q: "What is a spanning tree?", a: "A subset of edges T \u2286 E such that (V, T) is connected and acyclic (includes all nodes)." },
      { q: "Describe Kruskal's algorithm.", a: "Start with T = \u2205, consider edges in ascending weight order, add each edge unless it creates a cycle." },
      { q: "Describe Prim's algorithm.", a: "Start at a root node, iteratively add the lowest-weight edge with exactly one endpoint in the current tree." },
      { q: "What is Kruskal's runtime?", a: "O(m log n) \u2014 dominated by sorting edges." },
      { q: "What is Prim's runtime?", a: "O(m log n) \u2014 n extract-min and m decrease-key operations, each O(log n)." },
      { q: "State the Cut Property.", a: "For any subset S \u2282 V, the minimum-weight edge e with exactly one endpoint in S must be in the MST." },
      { q: "State the Cycle Property.", a: "For any cycle C in G, the maximum-weight edge f in C is not in the MST." },
      { q: "How is Prim's correctness proved?", a: "At each step, S forms a cut. Prim's adds the min-weight edge crossing it. By the Cut Property, every edge Prim's adds is in the MST." },
      { q: "What is a minimum bottleneck tree?", a: "A spanning tree T' that minimizes max_{e\u2208T'} w(e), the weight of its heaviest edge." },
      { q: "Is every MST also a minimum bottleneck tree?", a: "Yes. Proved by contradiction using the Cycle Property." },
      { q: "What is the defining characteristic of a greedy algorithm?", a: 'It always takes the "locally best" next step, and once a choice is made, it\'s permanent (never backtracks).' },
      { q: "Dijkstra's vs. Kruskal's/Prim's runtime?", a: "Dijkstra's: O(n log n + m). Kruskal's and Prim's: O(m log n)." },

          { q: "According to L1, what did AI expose about education?", a: "AI didn't dismantle learning \u2014 it exposed that education had quietly drifted from exploration toward production. Deliverables replaced reasoning as the currency of success, and the system had already become mechanized before AI arrived." },
          { q: "What is the 'task economy' in education?", a: "Grades reward completion more reliably than insight. Students optimize for what 'counts' (checklists, formatting) rather than what matters (understanding). Cognitive shortcuts become normalized because the system rewards task execution over reasoning." },
          { q: "Why does AI fit seamlessly into industrial schooling?", a: "AI excels at structured, formula-driven tasks. Many assignments value surface-level clarity over deep thought. AI succeeds where cognitive processing was already minimal, revealing how machine-compatible schoolwork had already become." },
          { q: "How does the brain actually learn, according to L1?", a: "Neural circuits strengthen when pushed beyond comfort. Confusion activates updating systems. Struggle triggers deeper encoding and long-term consolidation. Consolidation requires slow-wave cycles: reflection, sleep, and recall. Without friction, learning collapses into recognition rather than understanding." },
          { q: "What is the 'illusion of understanding'?", a: "AI explanations create a false sense of mastery. Fluent text gives the impression of depth even when depth wasn't built. The brain confuses familiarity with comprehension \u2014 a documented cognitive trap called the illusion of explanatory depth." },
          { q: "Why do AI outputs work so easily on human minds?", a: "Human cognition uses shortcuts to conserve energy. AI outputs fit these shortcuts better than many human explanations. The brain prefers smooth, low-effort answers. Evaluation takes more energy than acceptance, so we default to acceptance." },
          { q: "What does L1 say about how humans should learn?", a: "Ask questions before seeking answers. Connect new ideas to existing knowledge. Compare interpretations rather than memorize them. Rewrite concepts in your own language. Let confusion guide deeper inquiry. Humans learn through curiosity and interpretation, not speed." },
          { q: "What is 'reverse-engineering' a concept (L1)?", a: "Define the idea in ordinary language. Explain it without notes to test generative recall. Compare your explanation to AI's to detect missing links. Identify where your reasoning wobbles \u2014 that's the real learning zone. When you can teach it simply, you've truly learned it." },
          // L2 — Visualization Principles and Cognitive Science
          { q: "What is a data-driven visualization?", a: "Data visualization converts raw data into visual formats like charts, graphs, and maps to simplify interpretation. It enables users to identify trends, patterns, and outliers, serving as a bridge between complex data and actionable insights." },
          { q: "What are the key benefits of visualization?", a: "Identifies hidden trends and anomalies. Supports data-informed decisions. Enhances communication by transforming data into narratives. Improves retention \u2014 humans recall visual information more effectively than text or numbers." },
          { q: "What is the difference between exploratory and explanatory visualization?", a: "Exploratory: focused on discovering insights within the data (e.g., scatterplots showing correlations). Explanatory: communicates key findings to an audience (e.g., pie charts summarizing budget allocations)." },
          { q: "What is the difference between static and dynamic visuals?", a: "Static: infographics or reports with fixed data (e.g., PDFs). Dynamic: interactive dashboards with filtering options (e.g., Tableau). A hybrid approach combines explanatory and interactive elements." },
          { q: "Describe John Snow's Cholera Map (1854).", a: "Used dot maps to link cholera outbreaks to contaminated water pumps. It's an early example of visualization driving public health reforms." },
          { q: "Describe Florence Nightingale's Coxcomb Chart (1858).", a: "Visualized preventable deaths in military hospitals. It influenced healthcare improvements by showing that most soldiers died from preventable disease, not battle wounds." },
          { q: "What did William Playfair contribute to data visualization?", a: "Introduced bar charts, line graphs, and pie charts in the 1780s to represent economic data. He revolutionized how numerical data was communicated to the public." },
          { q: "What are the four elements of effective visualization?", a: "Clarity: focus on key info without unnecessary complexity. Accuracy: represent data truthfully with correct proportions. Engagement: use color, design, annotations to capture attention. Relevance: align visuals with audience expertise." },
          { q: "What are common challenges in visualization?", a: "Misinterpretation (unclear legends/labels), Complexity (overloading with data), Bias (manipulating axes, cherry-picking data), and Audience Mismatch (too technical or too simplified for the audience)." },
          { q: "What is the three-act structure in data storytelling?", a: "Act 1 (Setup): introduce who, what, and why. Act 2 (Conflict): highlight challenges, anomalies, or key trends. Act 3 (Resolution): provide insights, solutions, or next steps. This mirrors how people naturally process stories." },
          { q: "Why does storytelling work in visualization?", a: "Stories activate both logical and emotional parts of the brain. Information presented as narrative improves comprehension by 22% and retention by 35%. Stories guide interpretation, reduce ambiguity, and encourage action." },
          { q: "What are preattentive attributes?", a: "Visual elements processed instantly by the brain: color, size, position, and orientation. They enable faster interpretation. Example: a bold-colored bar highlighting the highest-performing category." },
          { q: "How should you use preattentive attributes?", a: "Color to highlight critical trends. Size for emphasis (larger = more important). Position to place key info prominently (e.g., top-left). Orientation for showing movement. Limit the number used at once to avoid visual overload." },
          { q: "What is confirmation bias in visualization?", a: "Audiences interpret visuals through their existing biases. Misleading narratives can exploit these biases to manipulate perception. The wolf pack example shows how a false story resonates because it aligns with human values like leadership and teamwork." },
          { q: "What are the core elements of storytelling in data?", a: "Focus: keep visuals concise, emphasize relevant data. Flow: ensure logical sequence guiding the audience. Emotional Connection: use real-world outcomes to make data meaningful." },
          { q: "What factors influence visualization design?", a: "Audience expertise (technical vs. non-technical), Purpose (exploration vs. communication), Medium (static vs. dynamic), and Data type (quantitative \u2192 line graphs, qualitative \u2192 word clouds)." },
          { q: "What are strategies for reducing cognitive load in visualization?", a: "Whitespace to separate sections, Highlighting with bold colors or callouts, Minimalism (only relevant data, remove decorative elements), and avoiding overly complex chart types like 3D stacked bars." },
          { q: "What is a visual metaphor in data visualization?", a: "Representing abstract concepts using familiar symbols or imagery. Examples: tree diagrams for growth/hierarchy, heatmaps resembling weather maps for intensity. Choose metaphors that align with audience's cultural context." },
          { q: "What are key accessibility considerations for visualization?", a: "Use colorblind-friendly palettes (blue-orange, not red-green). Ensure sufficient contrast between text and background. Include large, readable fonts. Add alt text or screen reader descriptions for digital visuals." },

          { q: "Why is consistency important in visualization design?", a: "Consistent fonts, colors, alignment make visuals professional and easier to interpret. Examples: same blue for 'Revenue' across all charts, aligned legends and titles. Consistency improves recognition and reduces cognitive strain." },
