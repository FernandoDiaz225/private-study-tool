          { s: "AI outputs align well with human cognition because they are always correct.", ans: false, e: "AI doesn't succeed because it's correct \u2014 it succeeds because it aligns with built-in cognitive shortcuts. The brain prefers smooth, low-effort answers. Evaluation takes more energy than acceptance." },
          // L2
          { s: "Data visualization converts raw data into visual formats to simplify interpretation.", ans: true, e: "This is the definition of data visualization. It enables users to identify trends, patterns, and outliers, serving as a bridge between complex data and actionable insights." },
          { s: "Exploratory visualization is designed to communicate key findings to an audience.", ans: false, e: "That's explanatory visualization. Exploratory visualization is focused on discovering insights within the data (e.g., scatterplots showing correlations)." },
          { s: "John Snow's 1854 cholera map used dot maps to link outbreaks to contaminated water pumps.", ans: true, e: "Snow's map is a landmark example of visualization driving public health reforms by spatially connecting cholera cases to specific water sources." },
          { s: "William Playfair invented the scatterplot and the heatmap.", ans: false, e: "Playfair introduced bar charts, line graphs, and pie charts in the 1780s. Scatterplots and heatmaps came later from other contributors." },
          { s: "Preattentive attributes are visual elements that require conscious effort to process.", ans: false, e: "Preattentive attributes (color, size, position, orientation) are processed instantly by the brain without conscious effort. That's what makes them powerful for drawing attention." },
          { s: "The three-act structure in data storytelling consists of Setup, Conflict, and Resolution.", ans: true, e: "Act 1 introduces the data context, Act 2 highlights challenges or key trends, Act 3 provides insights and next steps. This mirrors how people naturally process stories." },
          { s: "Information presented as narrative improves comprehension by 22% and retention by 35%.", ans: true, e: "Stories activate both logical and emotional parts of the brain, making information more memorable and actionable." },
          { s: "Confirmation bias in visualization means audiences always interpret data objectively.", ans: false, e: "The opposite: audiences interpret visuals through their existing biases. Misleading narratives can exploit these biases to manipulate perception." },
          { s: "Using red-green color palettes is recommended for accessible visualization.", ans: false, e: "Red-green palettes are problematic for colorblind users. Use colorblind-friendly alternatives like blue-orange instead." },
          { s: "Dashboards should display as many KPIs as possible to be comprehensive.", ans: false, e: "Best practice is to limit dashboards to 3\u20135 key metrics per screen. Too many metrics overwhelm users and reduce comprehension." },
          { s: "Consistency in fonts, colors, and alignment reduces cognitive strain for viewers.", ans: true, e: "Consistent design makes visuals professional and easier to interpret. It improves recognition and reduces the mental effort needed to process information." },
          { s: "Emotional elements in visualization should never be used because they distort data.", ans: false, e: "Emotional elements like color, layout, and annotations can enhance engagement and should be used responsibly. The key is to draw attention to insights without distorting or exaggerating the data." },
          { s: "Transparency in visualization means clearly stating data sources and acknowledging limitations.", ans: true, e: "Trust is the cornerstone of effective storytelling. Ethical visualization prioritizes accuracy over persuasion, including disclaimers for uncertainties." },
          { s: "Static visualizations include interactive dashboards with filtering options.", ans: false, e: "Static visuals are fixed (infographics, PDFs). Interactive dashboards with filtering are dynamic visuals." },
          { s: "The iterative process for visualization includes Design, Test, Adjust, and Re-Test.", ans: true, e: "Every visualization should be treated as a work in progress, evolving through user collaboration and feedback." },
          { s: "Florence Nightingale's Coxcomb Chart visualized battle casualties to argue for more troops.", ans: false, e: "It visualized preventable deaths in military hospitals (from disease, not combat) to argue for better healthcare and sanitary conditions." },
          { s: "Cognitive load in visualization can be reduced by adding more 3D effects and decorative elements.", ans: false, e: "The opposite. Reducing cognitive load means using whitespace, minimalism, and highlighting. 3D effects and decorative elements add clutter and reduce comprehension." },
          { s: "A visual metaphor represents abstract concepts using familiar symbols or imagery.", ans: true, e: "Examples include tree diagrams for growth/hierarchy and heatmaps resembling weather maps for intensity. They simplify complex ideas by making them relatable." },
        ],
        scenarios: [
          { scenario: "A city health department creates a dashboard showing COVID-19 case rates by neighborhood. The dashboard uses a red-green color scale, tiny fonts for labels, and displays 47 neighborhoods simultaneously with no filtering options. Community members report they can't figure out which areas are most affected.", question: "Using visualization principles from the course, identify at least 3 specific problems with this dashboard and explain how you would fix each one.", answer: "Problem 1: Red-green color scale is inaccessible to colorblind users (~8% of males). Fix: use a colorblind-friendly palette like blue-orange or a sequential single-hue scale. Problem 2: Displaying all 47 neighborhoods at once creates excessive cognitive load. Fix: add filters to let users focus on specific regions, or show a top-10 summary with drill-down options. Problem 3: Tiny fonts violate clarity principles \u2014 labels must be large and readable. Fix: increase font size, use concise labels, and ensure sufficient contrast. Additional: no filtering options means the dashboard fails the interactivity principle \u2014 users can't explore data relevant to them.", concepts: ["cognitive load", "accessibility", "preattentive attributes", "interactivity", "clarity"] },
          { scenario: "A marketing team creates a bar chart showing their product's market share at 45%, with the y-axis starting at 40% instead of 0%. The chart title reads 'Dominant Market Leader' and uses bright red for competitor bars and calming blue for their own.", question: "Analyze the ethical issues in this visualization. What principles of honest data storytelling are being violated?", answer: "Starting the y-axis at 40% exaggerates the visual difference between the product (45%) and competitors \u2014 this is axis manipulation that distorts perception. The title 'Dominant Market Leader' is editorializing, not objectively describing the data. Color choices (calming blue vs. alarming red) are emotionally manipulative, using preattentive attributes to bias interpretation rather than inform. These violate transparency and accuracy principles. Fixes: start axis at 0%, use a neutral descriptive title, use a neutral color palette, and include data source citations.", concepts: ["transparency", "accuracy", "emotional manipulation", "axis manipulation", "ethical design"] },
          { scenario: "A financial analyst presents quarterly revenue data using a 3D pie chart with 12 slices, each representing a different product line. The smallest slices (under 3%) are unlabeled, and the chart is rotated at an angle that makes the front slices appear larger.", question: "What visualization problems does this present? What alternative visualization would you recommend and why?", answer: "3D effects distort proportions \u2014 front slices appear larger due to perspective, violating accuracy. 12 slices exceed pie chart best practices (5-7 max) and create visual clutter. Unlabeled small slices hide data, reducing transparency. The rotation introduces perceptual bias. Alternative: use a horizontal bar chart sorted by revenue, which enables precise comparison, handles many categories well, and avoids all the distortion issues. If proportions are important, group small categories into 'Other' and use a 2D pie with max 6 slices.", concepts: ["accuracy", "cognitive load", "chart selection", "simplicity", "reducing complexity"] },
          { scenario: "A student creates a line graph showing temperature trends over 50 years but includes no axis labels, no title, no data source, and uses five different colors for what appears to be a single dataset. A classmate says: 'It looks cool but I have no idea what it means.'", question: "Using the elements of effective visualization and communication principles, diagnose what went wrong and how to fix it.", answer: "Missing title means no main takeaway is communicated. Missing axis labels prevent any meaningful interpretation. No data source undermines trust and transparency. Five colors for one dataset violates consistency and creates confusion \u2014 a single line should use one color. Fixes: add a descriptive title summarizing the insight (e.g., 'Global Temperature Rise 1970-2020'), label axes clearly ('Year' and 'Temperature (\u00b0C)'), cite the data source, use one color for the trend line. The 10-second test: if the takeaway isn't obvious in 10 seconds, simplify.", concepts: ["clarity", "labels/legends/titles", "consistency", "transparency", "10-second test"] },
          { scenario: "A nonprofit creates an infographic about childhood hunger. It uses a photo of a crying child, states '1 in 5 children go hungry' in massive red text, but provides no source, no timeframe, no geographic scope, and no definition of 'hungry.' The infographic goes viral.", question: "Analyze this from both a storytelling effectiveness and ethical visualization perspective. What works, what's problematic, and how would you improve it?", answer: "What works: emotional engagement is high \u2014 the image and bold statistic grab attention, which is effective storytelling. What's problematic: no data source undermines credibility. No timeframe or geographic scope makes the statistic unverifiable. 'Hungry' is undefined (food insecurity? malnutrition? skipping one meal?). This exploits emotional manipulation without providing context for informed understanding. Improvements: cite a specific source (e.g., USDA 2023), specify geography and timeframe, define the metric clearly, include a call-to-action with context. The three-act structure would help: Setup (the problem with data), Conflict (what causes it), Resolution (how to help).", concepts: ["emotional engagement", "transparency", "context", "ethical design", "three-act structure"] },
        ],
      },

      // ─────────────────────────────────────────────────────────────────
      // WEEK 2 — Data Frames (1.21.26)
      // ─────────────────────────────────────────────────────────────────
      {
        id: "w2", label: "Week 2", subtitle: "Data Frames & EDA Foundations", color: "#818cf8",
        flashcards: [
          { q: "What is a DataFrame in pandas?", a: "A tabular data structure with labeled rows and columns, similar to a spreadsheet or SQL table. Each row is an observation (record) and each column is a variable (feature). Columns can hold different data types (int, float, string, datetime), and the structure supports filtering, grouping, merging, and visualization." },
          { q: "What are the four key EDA stages in the DS/ML workflow?", a: "Overview (initial exploration of shape and types), Univariate Analysis (individual variables), Bivariate Analysis (pairs of variables), and Multivariate Analysis (relationships among multiple variables). Each stage builds understanding before cleaning and modeling." },
          { q: "What does univariate analysis examine, and what visualizations does it use?", a: "It examines the distribution and characteristics of a single variable. Key statistics: mean, median, mode, standard deviation, skewness, kurtosis. Visualizations: histograms, box plots, bar charts. Goal: understand shape, spot outliers, and identify missing data." },
          { q: "What does bivariate analysis examine, and what visualizations does it use?", a: "It examines relationships between two variables. Key statistics: correlation coefficients, covariance, group means. Visualizations: scatter plots, box plots by category, correlation heatmaps. Goal: detect patterns, correlations, and anomalies between variable pairs." },
          { q: "What is a pair plot and when do you use it?", a: "A collection of scatter plots for multiple numerical variables simultaneously, with univariate histograms on the diagonal. Used to quickly identify linear relationships, clusters, and outliers across all feature pairs. Produced with sns.pairplot(df[[cols]])." },
          { q: "What is a correlation matrix/heatmap and how do you interpret it?", a: "Shows pairwise correlation coefficients between numerical variables, visualized with color. Values range from -1 (perfect negative) to +1 (perfect positive); 0 = no correlation. Darker colors indicate stronger correlations. Produced with sns.heatmap(df.corr(), annot=True, cmap='coolwarm')." },
          { q: "What is skewness and what does each direction indicate?", a: "Skewness measures asymmetry in a distribution. Positive skew: right tail is longer, most values are low with a few high outliers (e.g., income). Negative skew: left tail is longer, most values are high. A skewness near 0 is roughly symmetric. Positive skew often requires log transformation to normalize." },
          { q: "What is kurtosis and what do leptokurtic vs. platykurtic distributions mean?", a: "Kurtosis measures 'tailedness.' Leptokurtic (>3): heavy tails, more extreme outliers. Platykurtic (<3): lighter tails, fewer extreme values. Mesokurtic (~3): normal distribution. High kurtosis in system data may indicate rare crashes or performance spikes." },
          { q: "What are the three types of missing data (MCAR, MAR, MNAR)?", a: "MCAR (Missing Completely At Random): missingness unrelated to any variable. Simple deletion works. MAR (Missing At Random): missingness related to other variables but not the missing value itself. MNAR (Missing Not At Random): missingness related to the value itself (e.g., high-earners skipping income questions). MNAR requires advanced imputation techniques." },
          { q: "What are the two main strategies for handling missing values?", a: "Deletion: remove rows (dropna()) or columns with too many missing values. Use when missingness is random and small. Imputation: fill with mean, median, or mode (fillna()); or use advanced methods like KNN. Use when you can't afford to lose data or missingness isn't random. Median is preferred over mean when outliers exist." },
          { q: "What is the IQR method for outlier detection?", a: "IQR = Q3 - Q1 (the middle 50% range). Outliers are defined as values below Q1 - 1.5*IQR or above Q3 + 1.5*IQR. Robust to skewed data and doesn't assume normality. Box plots visually align with this method. Flags 'unusual,' not necessarily 'incorrect.'" },
          { q: "What is the Z-score method for outlier detection?", a: "Z = (X - mean) / standard deviation. Values with |Z| > 3 are considered outliers. Measures how many standard deviations a point is from the mean. Assumes roughly symmetric distribution. Less stable for heavily skewed data since mean and std are pulled by extremes." },
          { q: "What is the suggested EDA visualization flow?", a: "Missing Value Heatmap (detect missing data) \u2192 Histograms (numerical distributions) \u2192 Bar Charts (categorical frequencies) \u2192 Box Plots (outliers and spread) \u2192 Scatter Plots (bivariate relationships) \u2192 Correlation Heatmap (pairwise correlations) \u2192 Pair Plots (all pairs at once)." },
          { q: "What are the key pandas DataFrame methods used in EDA?", a: "df.shape (dimensions), df.dtypes (column types), df.head() (first rows), df.describe() (summary stats for numerics), df.value_counts() (categorical frequencies), df.isnull().sum() (missing count per column), df.corr() (correlation matrix)." },
          { q: "What are bivariate analysis concerns to watch for?", a: "Spurious correlations (apparent relationships due to chance or hidden factors), confounding variables (a third variable driving both), non-linearity (correlation coefficients only capture linear relationships), and heteroscedasticity (variance changes across the range of x)." },
        ],
        trueFalse: [
          { s: "A pandas DataFrame stores data in a tabular format where rows are observations and columns are features.", ans: true, e: "This is the defining structure of a DataFrame. It mirrors a spreadsheet or SQL table, with labeled rows and columns that can hold heterogeneous data types." },
          { s: "Univariate analysis examines the relationship between two variables.", ans: false, e: "Univariate analysis examines a single variable in isolation. Bivariate analysis examines the relationship between two variables." },
          { s: "A positive skew means most values are high, with a few very low outliers pulling the left tail.", ans: false, e: "Positive skew means the right tail is longer. Most values are concentrated on the left (low side), with a few very high outliers pulling the distribution rightward." },
          { s: "Leptokurtic distributions have heavier tails and more extreme outliers than a normal distribution.", ans: true, e: "Leptokurtic means kurtosis > 3, indicating heavy tails and a sharper peak. This signals a higher frequency of extreme values compared to a normal distribution." },
          { s: "MNAR (Missing Not At Random) is the easiest type of missing data to handle with simple row deletion.", ans: false, e: "MNAR is the hardest to handle because missingness is related to the value itself. Simple deletion introduces bias. Advanced techniques like KNN or multiple imputation are needed." },
          { s: "The IQR method for outlier detection assumes data is normally distributed.", ans: false, e: "The IQR method is specifically valued because it does NOT assume normality. It is robust to skewed data, unlike Z-scores which assume a roughly symmetric distribution." },
          { s: "Z-scores flag outliers as values where |Z| > 3, meaning more than 3 standard deviations from the mean.", ans: true, e: "Z = (X - mean) / std. A |Z| > 3 threshold is the conventional outlier cutoff. However, this is less stable for skewed data because extreme values shift the mean and std." },
          { s: "df.describe() in pandas provides summary statistics for both numerical and categorical columns by default.", ans: false, e: "df.describe() by default only summarizes numerical columns. To include categorical columns you need to pass include='all' or examine categoricals separately with df.value_counts()." },
          { s: "A correlation heatmap uses color to show pairwise correlations between numerical variables.", ans: true, e: "Darker colors indicate stronger correlations (positive or negative). Values range from -1 to +1. Produced with sns.heatmap(df.corr(), annot=True)." },
          { s: "Pair plots show scatter plots for multiple pairs of numerical variables with histograms on the diagonal.", ans: true, e: "Pair plots (sns.pairplot) create an N x N grid where off-diagonals are scatter plots between variable pairs and diagonals show the univariate distribution of each variable." },
          { s: "When outliers are clearly due to measurement errors, removal is typically the appropriate strategy.", ans: true, e: "Outlier removal is justified when outliers are clearly erroneous. If they represent real phenomena (system failures, extreme behavior), they should be investigated, not automatically deleted." },
          { s: "Median imputation is preferred over mean imputation when a dataset contains outliers.", ans: true, e: "Outliers pull the mean toward extreme values, making mean imputation distort the imputed data. The median is a more robust central tendency measure that is not affected by outliers." },
        ],
        scenarios: [
          { scenario: "A data science student loads a dataset of hospital patient records with 10,000 rows and 20 columns. Running df.describe() reveals that the 'age' column has a max of 312 and a mean significantly higher than the median. Running df.isnull().sum() shows 'blood_pressure' is missing for 68% of records.", question: "What do these findings indicate, and what EDA steps and cleaning decisions should the student take next?", answer: "The age max of 312 indicates likely data entry errors or outliers, and the mean-median gap confirms positive skew. The student should use a box plot to visually identify outlier boundaries, then apply IQR or Z-score detection. For 'blood_pressure' missing at 68%, deletion would eliminate too much data. The student needs to determine the missingness type: if it's MNAR (e.g., only very ill patients lack readings), simple imputation would introduce bias and the column may need to be dropped or handled with advanced techniques. Next steps: histogram of age to see distribution shape, missing value heatmap to see if missingness is systematic, and investigate whether blood_pressure missingness correlates with other variables (MAR vs. MNAR).", concepts: ["univariate analysis", "outlier detection", "missing data types", "IQR method", "skewness"] },
          { scenario: "Two variables in a dataset show a correlation coefficient of 0.85 on a heatmap. A student concludes: 'These two features are strongly related and one is causing the other.' They decide to drop one variable entirely before modeling.", question: "Using bivariate analysis concepts from the course, what mistakes is the student making, and what should they do instead?", answer: "Mistake 1: Correlation does not imply causation. A 0.85 correlation means variables move together, but a confounding variable could be driving both. Mistake 2: Spurious correlation is possible, especially in small datasets. Mistake 3: Dropping a variable based solely on correlation is premature. High correlation (multicollinearity) can affect some models, but the variable might still contain unique predictive value. What to do instead: visualize the relationship with a scatter plot to check for non-linearity, look for potential confounders, and check whether the relationship holds across subgroups. For modeling purposes, consider dimensionality reduction rather than raw deletion.", concepts: ["bivariate analysis", "spurious correlations", "confounding variables", "correlation heatmap", "non-linearity"] },
          { scenario: "A student runs df.value_counts() on a 'customer_segment' column with 8 categories and finds one category labeled 'N/A' with 2,400 entries, and another labeled 'nan' with 150 entries, alongside 6 real categories. They also notice the column's dtype is 'object.'", question: "What EDA issues does this reveal, and what cleaning steps should the student take before encoding and visualization?", answer: "Two issues: (1) 'N/A' and 'nan' are both missing value representations that weren't caught as NaN by pandas, likely because they were read as strings. These need to be consolidated and replaced with actual NaN values using df.replace({'N/A': None, 'nan': None}). Then missing value handling strategy applies. (2) Dtype 'object' is correct for categorical data, but before encoding it must be clean. The student should also check cardinality: 8 categories is manageable but rare categories should be considered for grouping. For visualization, the column should be kept as categorical string type. Label encoding would be inappropriate here since it implies false ordering. One-hot or dummy encoding is the safer choice.", concepts: ["EDA", "missing value detection", "categorical encoding", "data types", "cardinality"] },
        ],
      },

      // ─────────────────────────────────────────────────────────────────
      // WEEK 3 — Principles of Effective Visualizations (1.26.26)
      // ─────────────────────────────────────────────────────────────────
      {
        id: "w3", label: "Week 3", subtitle: "Effective Viz Principles & Perceptual Design", color: "#34d399",
        flashcards: [
          { q: "What are the four data types and why does correctly identifying them matter?", a: "Nominal: categories with no order (product types, regions). Ordinal: ordered categories with unequal spacing (survey ratings, education levels). Interval: equal intervals but no true zero (temperature in Celsius, IQ scores). Ratio: equal intervals with a true zero (weight, income, sales). Misidentifying types leads to misleading charts, e.g., using a line graph for nominal data implies ordering that doesn't exist." },
          { q: "What is the key difference between interval and ratio data?", a: "Ratio data has a true zero, allowing meaningful ratio comparisons ('twice as much'). Interval data has no true zero, so ratios are meaningless: 40 degrees C is NOT twice as hot as 20 degrees C. Both use line charts, scatter plots, and histograms, but ratio data also supports bar charts with proportional comparisons." },
          { q: "What are the three types of cognitive load and how do they apply to visualization?", a: "Intrinsic load: the inherent complexity of the data itself. Extraneous load: extra mental effort from poor design, clutter, or irrelevant elements (minimize this). Germane load: effort directed toward actually understanding relationships and patterns (support this). Design goal: minimize extraneous load to free cognitive resources for germane load." },
          { q: "What are the five Gestalt laws relevant to visualization?", a: "Proximity: elements close together are perceived as related. Similarity: elements with shared visual properties (color, shape) are grouped. Continuity: the eye follows continuous lines and paths. Closure: incomplete shapes are perceived as complete. Figure-Ground: foreground data stands out from background. Applying these guides attention and reduces ambiguity." },
          { q: "What is the Law of Proximity and how is it used in charts?", a: "Elements placed near each other are perceived as belonging to the same group. In scatter plots, tight clusters imply distinct groupings. In bar charts, spacing between bars separates categories while grouped bars show subcategory relationships. Maintain appropriate spacing to avoid ambiguous grouping." },
          { q: "What is the Law of Figure-Ground in visualization?", a: "People instinctively separate visuals into foreground (what they focus on) and background (context). Apply it by using brighter colors, bolder lines, or larger sizes for key data points, and muted/lighter colors for background elements. Sufficient contrast is essential to guide attention correctly." },
          { q: "What are the three cognitive biases most relevant to data visualization?", a: "Confirmation bias: viewers seek info that confirms their existing beliefs; misleading visuals exploit this. Anchoring bias: the first data point or scale value heavily influences interpretation of everything after. Framing effect: how data is presented (positive vs. negative framing, scale choices) changes emotional response even when data is identical." },
          { q: "What is the 10-second test for visualization clarity?", a: "If the main takeaway from a visualization isn't immediately obvious within 10 seconds, it needs to be simplified. This means one key message per chart, a descriptive title that states the insight (not just the variable), clear axis labels, and eliminating decorative clutter." },
          { q: "What is visual encoding in data visualization?", a: "The process of transforming data attributes into graphical elements: position, size, color, and shape. Position is most accurate for comparisons. Size represents magnitude but can mislead if area/volume is confused. Color differentiates categories or intensities. Shape distinguishes categorical groups. Effective encoding minimizes cognitive load." },
          { q: "Why is position the most accurate visual encoding channel?", a: "Humans perceive spatial differences more accurately than differences in size, color, or shape. Position is intuitive for pattern identification and value comparison. This is why bar charts and scatter plots are so effective: they rely primarily on position to encode values." },
          { q: "What is the difference between sequential, diverging, and categorical color schemes?", a: "Sequential: single hue gradient from light to dark, showing 'more or less' of something (e.g., population density). Diverging: two contrasting colors split around a meaningful center (e.g., above/below average). Categorical: distinct, unordered colors for separate groups (e.g., product types). Using the wrong scheme implies relationships that don't exist." },
          { q: "What is 'dual-coding theory' and how does it apply to visualization?", a: "Information is retained better when presented through both visual AND verbal channels simultaneously. In visualization: combine charts with annotations, captions, and titles that explain the insight in words. This reinforces memory encoding through two pathways rather than one." },
          { q: "What is ordinal data and what visual mistake is commonly made with it?", a: "Ordinal data has meaningful order but unequal spacing (e.g., Strongly Agree, Agree, Disagree). The common mistake is treating it like interval data, implying equal distances between ranks. Fix: use sequential color scales or maintain consistent ordering without assuming equal visual spacing between categories." },
          { q: "How do you approach 'mixed data types' in a single dataset?", a: "Use multiple visual encoding techniques layered together. For example: position for numerical values, color for categorical groupings, size for another quantitative dimension. Use dashboards or small multiples. Ensure clear legends that explain each encoding channel so viewers don't confuse the layers." },
        ],
        trueFalse: [
          { s: "Nominal data should be visually arranged in a way that implies ranking or hierarchy.", ans: false, e: "Nominal data has no inherent order. Visual arrangements that imply hierarchy (like size ordering or position on a scale) introduce false structure. Use bar charts or pie charts that display frequency without implying rank." },
          { s: "Ratio data supports meaningful ratio comparisons like 'twice as much' because it has a true zero.", ans: true, e: "The true zero is what makes ratio comparisons valid. Income of 80k being twice 40k is meaningful. Temperature in Celsius lacks a true zero, so 40C is not 'twice as hot' as 20C." },
          { s: "Extraneous cognitive load is the inherent complexity of the data itself.", ans: false, e: "Extraneous load comes from poor design choices: clutter, irrelevant elements, inconsistent scales. Intrinsic load is the inherent complexity of the data. Good visualization minimizes extraneous load." },
          { s: "The Gestalt Law of Continuity means viewers' eyes naturally follow continuous lines and paths.", ans: true, e: "This is why line charts effectively show trends over time. Smooth connections between data points create a perceived flow that guides interpretation of change." },
          { s: "The Gestalt Law of Closure means viewers need complete shapes to understand them.", ans: false, e: "Closure means viewers perceive incomplete shapes as complete. This allows minimalist designs to work: partial outlines are mentally completed by the viewer without requiring full borders or frames." },
          { s: "Anchoring bias in visualization means the first value or scale shown heavily influences how all other values are interpreted.", ans: true, e: "The first data point, axis starting value, or initial chart view anchors interpretation. This is why starting a y-axis at a truncated value is so misleading: it sets a false anchor for comparison." },
          { s: "Position is the most accurate visual encoding channel for comparing quantitative values.", ans: true, e: "Humans perceive spatial position more accurately than differences in size, color, or shape. This is the primary reason bar charts and scatter plots are so effective for comparison tasks." },
          { s: "A diverging color scale is best for showing categories with no meaningful order.", ans: false, e: "Diverging scales show direction away from a meaningful center value (above/below average). For unordered categories, use categorical (qualitative) color schemes with distinct, non-sequential colors." },
          { s: "Dual-coding theory suggests that combining visual charts with verbal annotations improves retention.", ans: true, e: "Information presented through both visual and verbal channels simultaneously is retained better. Titles, annotations, and captions that explain insights in words reinforce the visual encoding in memory." },
          { s: "Treating ordinal data as interval data is acceptable because both have a meaningful order.", ans: false, e: "Ordinal data has unequal spacing between ranks. Treating it as interval implies equal distances, which introduces false precision. Always preserve order without assuming equal step sizes." },
          { s: "The framing effect means viewers will interpret the same data differently depending on how it is visually presented.", ans: true, e: "Visual choices like color (red implies danger), axis range, and annotation framing change emotional and interpretive responses even when the underlying data is identical. This is a central concern for ethical visualization design." },
          { s: "Good visualization titles should describe the variable being plotted (e.g., 'Revenue Over Time').", ans: false, e: "Effective titles state the insight or takeaway, not just the variable. 'Revenue Over Time' describes the data; 'Q3 Sales Growth Driven by Product Launch' communicates meaning and passes the 10-second test." },
        ],
        scenarios: [
          { scenario: "A researcher plots customer satisfaction survey responses (Strongly Agree, Agree, Neutral, Disagree, Strongly Disagree) on a line graph where the x-axis treats these five categories as if they were equally spaced numeric values (1, 2, 3, 4, 5). The trend line slopes smoothly downward.", question: "What data type error is being made, and what visualization would be more appropriate? Apply the relevant course concepts.", answer: "The error is treating ordinal data as interval data. Survey responses have meaningful order, but the spacing between 'Strongly Agree' and 'Agree' is not necessarily equal to the spacing between 'Neutral' and 'Disagree.' A line graph with a continuous x-axis implies equal spacing and allows ratio interpretation, which is invalid here. A better visualization: a bar chart preserving the ordinal order, showing frequency (count or percentage) of each response. Sequential color coding from positive to negative can reinforce the ranking without implying equal distance. The key is maintaining order without inventing numeric structure that the data doesn't have.", concepts: ["ordinal data", "data types", "chart selection", "visual encoding", "interval vs. ordinal"] },
          { scenario: "A dashboard designer places two bar charts side by side comparing sales in Region A and Region B. Region A's chart has a y-axis from 0 to 100k. Region B's chart has a y-axis from 0 to 10k because its sales are smaller. Viewers consistently conclude Region B is performing 'almost as well' as Region A.", question: "Using Gestalt principles and cognitive bias concepts, explain what's happening and how to fix it.", answer: "Two problems: (1) Inconsistent scales violate the visual comparison assumption. The Gestalt Law of Proximity creates the impression that side-by-side charts can be directly compared, but inconsistent axes make that comparison invalid. (2) Anchoring bias makes viewers anchor on bar height, not axis values. Viewers see 'tall bars' in both charts and assume similar magnitude. Fix: use a shared y-axis (0 to 100k) for both charts so visual bar height directly reflects actual differences. If Region B's bars become tiny, that accurately represents the data. Alternatively, add explicit callouts noting 'Note: different y-axis scales.' The core principle: visual proximity implies comparability, so inconsistent scales are deceptive even when unintentional.", concepts: ["Gestalt proximity", "anchoring bias", "shared scales", "scale consistency", "ethical design"] },
          { scenario: "A student builds a bubble chart comparing 15 product categories. Each bubble's position encodes average price (x) and units sold (y). Bubble size encodes profit margin, and bubble color encodes geographic region (8 regions). The student uses a rainbow color scale for the regions.", question: "Identify the perceptual and encoding problems, and redesign the chart's approach using course principles.", answer: "Problems: (1) Eight region colors with a rainbow scale creates categorical confusion. Rainbow scales imply order (violet < blue < green < ... < red) which doesn't exist for unordered regions. Fix: use a qualitative palette with 8 distinct, non-sequential colors or reduce to fewer categories. (2) Bubble size for profit margin can mislead if area and diameter are confused. Viewers naturally compare diameter, not area. Be explicit about what size encodes. (3) Four simultaneous encoding channels (x position, y position, size, color) pushes cognitive load limits. Consider breaking into two charts: one for price/volume relationships, another for region comparisons. Apply the principle of minimizing extraneous cognitive load: each encoding should earn its place. A figure-level legend is essential to manage all channels.", concepts: ["visual encoding channels", "categorical color", "cognitive load", "perceptual accuracy", "figure-ground"] },
        ],
      },

      // ─────────────────────────────────────────────────────────────────
      // WEEK 4 — Data Cleaning (2.2.26) + Visual Encoding (2.4.26)
      // ─────────────────────────────────────────────────────────────────
      {
        id: "w4", label: "Week 4", subtitle: "Data Cleaning, Encoding & Visual Encoding", color: "#fb923c",
        flashcards: [
          { q: "What is the data cleaning pipeline order and why does it matter?", a: "EDA \u2192 Categorical Encoding \u2192 Missing Values \u2192 Outliers \u2192 Visualization. Order matters because encoding must happen before outlier detection (outlier detection requires meaningful numeric structure). Missing value strategies differ by type (categorical vs. numeric). Encoding mistakes silently propagate into every later visualization." },
          { q: "What is categorical encoding and why is it necessary?", a: "Converting categorical variables into a form that visualization and modeling systems can interpret. The goal is to preserve meaning, not just 'make everything numeric.' Encoding determines what comparisons a visualization is allowed to make. Good encoding makes valid relationships visible; bad encoding invents relationships that don't exist." },
          { q: "What is label encoding and why is it almost always wrong for visualization?", a: "Assigning arbitrary integers to categories (e.g., 1st class = 0, 2nd class = 1, 3rd class = 2). This implies false ordering and false distance between categories. A box plot with label-encoded x-axis treats the categories as if they have numeric spacing, creating a visualization bug. Almost never appropriate for visualization; only used when true ordinal meaning exists." },
          { q: "What is one-hot encoding and when is it the preferred approach?", a: "Each category becomes its own binary (0/1) column: is_1st_class, is_2nd_class, etc. Only one column is 'on' per observation. Preserves category independence without implying order or distance. Works well for bar charts and faceting. Preferred for nominal variables. Becomes problematic with high-cardinality data (many categories)." },
          { q: "What is dummy coding and how is it different from one-hot encoding?", a: "Functionally equivalent to one-hot encoding. One-hot encoding is the term in computer science / machine learning; dummy coding / dummy variables is the traditional statistics/econometrics term for the same operation. No technical difference." },
          { q: "Why should categorical variables NOT be one-hot encoded before passing to matplotlib for a scatter plot?", a: "Matplotlib doesn't need multiple binary columns to color-code groups. It needs a single column with the group label. One-hot encoding expands one column into many, which adds cognitive noise. For visualization: one column + color mapping = clear grouping. For models: multiple binary columns = correct numeric input. The goal differs between visualization and modeling." },
          { q: "What is winsorization and when is it used for outlier handling?", a: "Replacing extreme outlier values with the boundary values (e.g., values above the 95th percentile are set to the 95th percentile value). Preserves all observations and dataset size. Limits influence of extreme values without deleting them. Often preferred for dashboards where sample size matters. A compromise between raw removal and keeping all original values." },
          { q: "What is the visual effect of removing outliers vs. winsorization?", a: "Removal: distribution becomes narrower, visual scale shifts to typical values, extreme cases disappear entirely. Winsorization: extreme values still conceptually exist but are capped, distribution shape is better preserved, less aggressive alteration of the data. Side-by-side comparison shows 'same data, three different stories': raw vs. removed vs. winsorized." },
          { q: "What is plt.subplots() and what does it return?", a: "A matplotlib function that creates a figure (canvas) and one or more subplot axes simultaneously. Returns two objects: fig (the overall canvas, controls size, saving) and axes (collection of individual plotting regions). For multiple subplots: axes is array-like (axes[0], axes[1], ...). Data is drawn on axes, not on fig." },
          { q: "In plt.subplots(1, 2, figsize=(12, 4)), what does each argument mean?", a: "(1, 2): 1 row, 2 columns = two plots side by side. figsize=(12, 4): total figure width 12 inches, height 4 inches. Each subplot gets half the available width. Adding more subplots makes each one smaller, so increase figsize proportionally. figsize controls readability; the row/column arguments control layout structure." },
          { q: "What is aspect ratio in visualization and why does it matter?", a: "The relationship between a plot's width and height. Controls how slopes and trends visually appear. Tall plots exaggerate variation; wide plots flatten trends. The same data can look dramatically different with different aspect ratios. 'Aspect random' means it wasn't intentionally set, creating uncontrolled distortion. In matplotlib: 'auto' for exploration, 'equal' when geometry matters (spatial data)." },
          { q: "What is the alpha parameter in matplotlib and what does it control?", a: "Alpha controls opacity/transparency. Alpha = 1.0 is fully opaque; alpha = 0.0 is invisible; values between create partial transparency. Useful for overlapping data points in scatter plots (seeing density), for gridlines (making them subtle without removing them), and for layering multiple visual elements without obscuring each other." },
          { q: "What are gridlines' proper role in a visualization?", a: "Gridlines are scaffolding, not content. They support value estimation and comparison. They should be subtle (low alpha, light color), not dominant. Overly strong grids compete with data for attention. The principle: gridlines should help the viewer read the data without drawing attention to themselves." },
          { q: "When should you use tight_layout() vs. manual subplot spacing control?", a: "tight_layout() is reactive: it prevents label overlaps automatically and is good for quick exploration. Limitations: less control over analytical emphasis, may compress subplots unevenly, can conflict with annotations. Manual control (wspace, hspace parameters) is better for dashboards and final presentations where spacing needs to encode analytical structure. Automation is a starting point." },
          { q: "What does sharey=True do in plt.subplots()?", a: "Links the vertical (y) scales across all subplots so they share the same range. Enables honest visual comparison: viewers can compare bar/line heights directly because they're on the same scale. Without shared scales, side-by-side subplots mislead viewers who assume equal scales by default." },
        ],
        trueFalse: [
          { s: "Label encoding is the preferred encoding method for nominal categorical variables before visualization.", ans: false, e: "Label encoding assigns arbitrary integers (1, 2, 3...) implying false order and distance. For nominal variables with no inherent order, one-hot encoding preserves category independence. Label encoding is almost never appropriate for visualization." },
          { s: "One-hot encoding creates multiple binary columns, one per category, where only one is '1' per observation.", ans: true, e: "This preserves category identity without inventing order or distance. Each column answers a yes/no question: 'Is this observation in this category?' It's the safer default for nominal categorical variables." },
          { s: "You should one-hot encode a categorical variable before passing it to matplotlib for color-coding a scatter plot.", ans: false, e: "Matplotlib needs a single column with the category labels to map colors. One-hot encoding would create multiple binary columns, which is cognitive noise for visualization. One column + color mapping = clear grouping. One-hot is for models, not plots." },
          { s: "Winsorization removes extreme observations entirely from the dataset.", ans: false, e: "Winsorization replaces extreme values with boundary values (caps them at a percentile threshold). All observations remain in the dataset. This is the key difference from removal: dataset size is preserved, but extreme influence is limited." },
          { s: "fig in plt.subplots() represents the overall canvas, while axes represents the individual plotting regions.", ans: true, e: "fig controls the entire figure (size, saving). axes is where data gets drawn. For multiple subplots, axes is array-like: axes[0] is the first subplot, axes[1] the second. You draw on axes, not on fig." },
          { s: "figsize=(12, 4) in plt.subplots(1, 2, figsize=(12, 4)) sets the size of each individual subplot.", ans: false, e: "figsize sets the total figure size (the entire canvas), not each subplot. With 2 subplots, each gets approximately 6 inches of the 12-inch width. To keep subplots readable as you add more, increase the total figsize." },
          { s: "A tall aspect ratio exaggerates variation in a trend, while a wide aspect ratio flattens it.", ans: true, e: "Aspect ratio changes how slopes and differences appear without changing the data. Tall plots compress the x-axis relative to y, making changes look steeper. Wide plots stretch x, making trends look flatter. This is why aspect ratio is a design choice, not a default to ignore." },
          { s: "Gridlines should be visually prominent to help viewers read values accurately.", ans: false, e: "Gridlines are scaffolding. They support value estimation but should be subtle (low alpha, light color) so they don't compete with the actual data for attention. Overly strong grids add visual noise and increase cognitive load." },
          { s: "sharey=True in plt.subplots() links the y-axis scales across all subplots, enabling honest comparison.", ans: true, e: "Without shared scales, viewers assume side-by-side plots are directly comparable, which is incorrect if y-axes have different ranges. sharey=True prevents this accidental distortion and is essential for dashboards." },
          { s: "tight_layout() gives precise control over subplot spacing and is recommended for final dashboard layouts.", ans: false, e: "tight_layout() is reactive and automatic. It prevents overlaps but offers little control over analytical emphasis. For dashboards and polished outputs, manual control via wspace and hspace is better. Tight_layout is a starting point for exploration." },
          { s: "Alpha = 0.5 in matplotlib means an element is 50% transparent.", ans: true, e: "Alpha controls opacity: 1.0 = fully opaque, 0.0 = invisible. 0.5 makes an element semi-transparent, useful for overlapping scatter plot points (revealing density) or subtle gridlines." },
          { s: "The data pipeline order in Week 4 is: Missing Values \u2192 Encoding \u2192 Outliers \u2192 EDA.", ans: false, e: "The correct order is: EDA \u2192 Categorical Encoding \u2192 Missing Values \u2192 Outliers \u2192 Visualization. EDA must come first to understand the data. Encoding must precede outlier detection because outlier methods require meaningful numeric structure." },
        ],
        scenarios: [
          { scenario: "A student is cleaning the Titanic dataset for visualization. They run df['class'].map({'First': 1, 'Second': 2, 'Third': 3}) to encode passenger class, then create a box plot with class on the x-axis and fare on the y-axis. The box plot shows what appears to be a smooth upward trend from 1 to 3.", question: "What encoding error has the student made and how does it affect the visualization? What should they do instead?", answer: "The student used label encoding on a nominal variable (passenger class has no inherent numeric meaning, or at best ordinal meaning where spacing isn't equal). This creates a visualization bug: the box plot's x-axis treats 1, 2, 3 as equally spaced numeric values, implying an equal 'distance' between First and Second class that doesn't exist in the data. The apparent smooth trend could be an artifact of the encoding choice, not a real pattern. Fix: keep 'class' as a categorical string variable and pass it directly to seaborn's box plot. Seaborn will handle the grouping correctly. If ordering matters, specify the order explicitly as a parameter without encoding numerically. The principle: categorical variables are labels, not quantities. Visualization libraries can handle them directly without numeric conversion.", concepts: ["label encoding", "categorical encoding", "visualization bugs", "ordinal data", "box plot"] },
          { scenario: "A student creates two side-by-side histograms comparing fare distributions for Titanic survivors vs. non-survivors. The first histogram uses the raw data (max fare ~512). The second removes fare outliers using IQR before plotting. The student presents both and says: 'These are both valid and show the same distribution.'", question: "Is the student correct? Using concepts from the course, explain what's different about these two plots and what analytical decisions they reflect.", answer: "The student is not correct that they 'show the same distribution.' Same data, different stories. Removing IQR outliers eliminates high-fare passengers who may disproportionately be survivors (first-class passengers had higher survival rates). This changes the visible shape of the distribution and potentially hides a meaningful pattern. The raw histogram shows the true spread but is visually dominated by extreme values. The cleaned histogram shifts visual emphasis to typical fares but erases rare but meaningful cases. Both reflect design decisions, not neutral reporting. The student should: (1) label both plots clearly noting 'outliers removed' in one, (2) justify why removal was or wasn't appropriate given the context, and (3) compare whether the removal changed any conclusions. Handling outliers is never neutral; it always alters the story.", concepts: ["outlier handling", "IQR method", "visual effect of cleaning", "analytical decisions", "transparency"] },
          { scenario: "A student creates a 1-row, 3-column subplot layout comparing fare distributions under three outlier handling strategies: raw, IQR-removed, and winsorized. They use plt.subplots(1, 3, figsize=(8, 4)) and notice the plots look cramped and labels overlap.", question: "Using the subplot layout principles from the course, diagnose the spacing problem and explain how to fix it without changing the visualization's analytical intent.", answer: "The figsize of (8, 4) is too small for 3 subplots. With 3 columns sharing 8 inches of width, each subplot only gets about 2.7 inches, which is too narrow for axis labels and titles to render without overlapping. Fixes: (1) Increase figsize proportionally, e.g., (15, 4) to give each subplot about 5 inches. (2) Use plt.tight_layout() as a quick fix to prevent overlap, but this is reactive and may compress plots unevenly. (3) For more control, use plt.subplots_adjust(wspace=0.4) to set explicit horizontal spacing. (4) Add per-subplot titles using axes[i].set_title() and axis labels using axes[i].set_xlabel(). The principle: figsize controls readability, not analysis. Spacing communicates structure. Cramped labels increase cognitive load and make the comparison harder to use, undermining the purpose of side-by-side comparison.", concepts: ["subplots", "figsize", "spacing", "tight_layout", "cognitive load"] },
        ],
      },

      // ─────────────────────────────────────────────────────────────────
      // WEEK 5 — Visual Encoding Part 2 (2.9.26) + Scales, Bins, Interactivity (2.11.26)
      // ─────────────────────────────────────────────────────────────────
      {
        id: "w5", label: "Week 5", subtitle: "Scales, Bins, Interactivity & Perceptual Load", color: "#f472b6",
        flashcards: [
          { q: "What is a linear scale and when is it the right choice?", a: "A linear scale means equal visual steps represent equal differences in the data. Moving 10 units always looks the same. Default for most charts. Best when: absolute differences matter (not ratios), data doesn't span extreme ranges, audience expects standard reading. Usually the correct starting point before considering alternatives." },
          { q: "What is a log scale and when should it be used?", a: "A log scale means equal visual steps represent equal multiplicative ratios (each step is 'times larger'). Going from 10 to 20 looks the same as going from 100 to 200. Use when: values span huge ranges, ratios or percent change matter more than absolute differences, growth is multiplicative. Common in science, economics, population data. Must be clearly labeled." },
          { q: "How do linear and log scales handle linear growth vs. exponential growth?", a: "Linear growth is straight on a linear scale and curves on a log scale. Exponential growth curves on a linear scale (hard to read) and becomes a straight line on a log scale (easy to read). This is the key diagnostic: if your data looks curved on a linear scale, a log scale may reveal structure. Scale choice encodes what kind of change matters." },
          { q: "What is the key intuition check for choosing between linear and log scale?", a: "Ask: 'Do I care about differences or ratios?' Differences matter \u2192 use linear. Ratios/percent change matter \u2192 use log. If unsure, start linear. Always explain a log scale choice in text. Never surprise the viewer with a non-default scale without labeling it clearly." },
          { q: "What are bins in a histogram and why do they matter?", a: "Bins group continuous data values into ranges; each bin counts how many values fall inside. Bins control histogram resolution. Different bin counts tell different stories from the same data. No single 'correct' bin count exists. Defaults are guesses, not analytical decisions. Bin choice is a design decision that must be intentional." },
          { q: "What happens with too few bins (under-resolution) vs. too many bins (over-resolution)?", a: "Too few bins: bars are wide, different values lumped together, peaks and gaps disappear, distribution looks simpler than it is, important structure is hidden. Too many bins: bars are narrow, counts fluctuate sharply, noise becomes dominant, plot looks 'spiky,' overall pattern is harder to see. The goal: find the resolution that reveals real structure without amplifying noise." },
          { q: "What is perceptual load in visualization?", a: "The mental effort required to read a plot. Increases with clutter, inconsistency, and competing elements. Decreases with alignment, restraint, and consistency. High perceptual load causes missed patterns and slower interpretation. Design choices directly control load. Common sources: too many ticks, excess gridlines, overlapping labels, unnecessary color variation, redundant legends." },
          { q: "What are ticks and what design decisions do they involve?", a: "Ticks are reference marks on an axis that define where viewers estimate values. More ticks = more precision but more visual clutter. Fewer ticks = faster reading but less accuracy. Ticks don't change data, only how it's read. Manual tick setting (set_xticks, set_yticks) overrides automatic defaults. Tick spacing defines perceptual resolution. Consistency across subplots is essential for comparison." },
          { q: "What is the difference between axis limits and ticks?", a: "Axis limits control what data is shown (visible range). Ticks control how that range is read (reference resolution). Changing limits doesn't change ticks; changing ticks doesn't change limits. Both must be coordinated deliberately. Confusing them causes design errors. Dashboards require both to be explicitly managed." },
          { q: "What does static visualization 'lock in' that interactivity can release?", a: "Static plots freeze: bin count, axis limits, scale type, aggregation level, color meaning, reference thresholds, and subplot layout. Interactivity allows users to adjust these parameters. This is both a strength (reproducibility, stability, authority) and a limitation (can't serve different user questions). Interactivity extends design, it doesn't replace it." },
          { q: "What are the five core interaction types in interactive visualization?", a: "Selection (clicking or brushing individual points). Filtering (sliders, dropdowns, category toggles). Navigation (pan, zoom, scroll, focus+context). Parameter Adjustment (bin count sliders, scale toggling, smoothing). View Linking (coordinated highlights, cross-filtering, shared scales across panels)." },
          { q: "What is the 'anchoring and default bias' problem in interactive visualization?", a: "The first state a viewer sees shapes their interpretation. Users rarely explore all parameter combinations. Defaults become implicit recommendations even when labeled as adjustable. Interaction does not remove bias, it can amplify it: users may only explore options that confirm their initial impression. 'Interactive' does not mean neutral. Good defaults still matter." },
          { q: "What are the cognitive consequences of adding too much interactivity?", a: "Decision fatigue from too many options. Increased cognitive load from managing controls alongside data. Illusion of control (users feel they understand because they can manipulate parameters, but may miss important combinations). Confirmation bias amplification (users cherry-pick parameter settings that support their priors). Progressive disclosure and minimal viable interactivity are design strategies to manage this." },
          { q: "When is static visualization preferable to interactive?", a: "Reports needing consistency and reproducibility. Public reporting where audience lacks visualization training. High-stakes decisions requiring stable, authoritative results. Simple comparisons that don't require exploration. When default design already misleads (adding interactivity doesn't fix poor defaults). When parameter tuning hides instability in results." },
          { q: "What is Plotly Express and why is it used for interactivity?", a: "A Python library that creates interactive visualizations by default. Hover tooltips, zoom, pan, and selection tools are built-in. Supports categorical color mapping and is designed for exploration. Interactivity is architectural (event-driven, reactive), not cosmetic. Matplotlib is primarily static; Plotly Express extends its capabilities for interactive use cases without requiring custom event wiring." },
          { q: "What is the 'exploration vs. explanation' tension in visualization?", a: "Exploratory dashboards prioritize flexibility: users can adjust parameters, filter data, and discover patterns. Explanatory storytelling prioritizes commitment: fixed design choices communicate a specific insight. Static visualization is best for explanation; interactive visualization is best for exploration. Hybrid approaches include guided interaction, progressive reveal, and narrative constraints." },
        ],
        trueFalse: [
          { s: "A log scale changes the underlying data values to make them more manageable.", ans: false, e: "Log scales change how visual distance represents data differences, not the data values themselves. Equal visual steps on a log scale represent equal multiplicative ratios. The data is never altered; only the viewer's ability to perceive it changes." },
          { s: "Exponential growth appears as a straight line when plotted on a log scale.", ans: true, e: "Log scales compress multiplicative growth so each doubling occupies the same visual distance. This transforms exponential curves (hard to read on linear) into straight lines (easy to compare slopes)." },
          { s: "Using too few bins in a histogram reveals more accurate information about the distribution.", ans: false, e: "Too few bins lump different values together, hiding peaks, gaps, and real structure. The distribution appears simpler than it is. Under-resolution can be just as misleading as over-resolution." },
          { s: "More tick marks on an axis always improves accuracy and readability.", ans: false, e: "More ticks increase numerical precision but also increase visual clutter. Dense ticks slow scanning and compete with data for attention. The right tick density depends on the task: precision vs. fast interpretation." },
          { s: "Interactive visualization eliminates the need for good static design principles.", ans: false, e: "Interaction does not fix bad design. Poor defaults mislead exploration. First impressions anchor interpretation. Static design principles (scales, labels, colors, consistency) apply to interactive systems. Interactivity extends, not replaces, fundamentals." },
          { s: "The anchoring effect means users who see interactive visualizations are less susceptible to bias than users of static charts.", ans: false, e: "The opposite can be true. The first state users see anchors interpretation, and interaction can amplify confirmation bias by allowing users to tune parameters until they find a view that confirms their priors. Interactive does not mean neutral." },
          { s: "Plotly Express requires manual event wiring to add hover tooltips and zoom functionality.", ans: false, e: "Plotly Express enables interactivity by default. Hover tooltips, zoom, pan, and selection are built-in. This is why it's used for interactive visualization instead of matplotlib, which is primarily static and requires additional frameworks for event-driven behavior." },
          { s: "Static visualization is the better choice for reproducible, high-stakes reporting.", ans: true, e: "Static visuals freeze design choices, making results consistent and reproducible. Interactive dashboards can produce different views depending on parameter settings, raising questions about which state is 'the result.' Reports and scientific publications typically use static visualizations." },
          { s: "Scale consistency across subplots is optional when each subplot contains different data ranges.", ans: false, e: "Inconsistent scales break comparison even when side-by-side placement implies comparability. Viewers assume equal scales by default. Mixed scales mislead quietly. Dashboards must explicitly control scales." },
          { s: "Bins are an intrinsic property of the data and do not change based on design choices.", ans: false, e: "Bins are entirely a design choice. They are not inherent to the data. Different bin counts on the same data produce different visual stories. Defaults are guesses. Bin choice should be intentional and justified." },
          { s: "A linear scale is the correct choice when the data involves multiplicative growth over large ranges.", ans: false, e: "Multiplicative growth over large ranges is when a log scale becomes appropriate. Linear scales 'flatten' exponential curves and hide structure at small values. The key question: are differences or ratios more meaningful?" },
          { s: "Progressive disclosure is a strategy for managing cognitive load in interactive systems.", ans: true, e: "Progressive disclosure means revealing complexity gradually, starting with the most important controls and showing advanced options only when needed. This limits the number of options competing for attention at once and reduces decision fatigue." },
        ],
        scenarios: [
          { scenario: "A data journalist is visualizing country GDP data ranging from 800 million dollars (small nations) to 25 trillion dollars (USA). On a linear scale, most countries are squished near zero and the chart is dominated by a handful of large economies. A colleague says: 'Just zoom in on the y-axis to show the smaller countries better.'", question: "Evaluate the colleague's suggestion. What would zooming in accomplish, and what would it hide? Is there a better approach? Apply scale concepts from the course.", answer: "Zooming in (narrowing the y-axis range) would increase detail for small economies but would cut off large ones, hiding the true scale of the difference. This is the 'first fix' from the course: changing visible range, not scale. It keeps linear meaning but is 'dangerous if used to exaggerate' because viewers lose context of the full distribution. A better approach: use a log scale. The GDP data spans roughly 4-5 orders of magnitude, making this a clear case where 'ratios matter more than differences.' On a log scale, each tick represents an equal multiplicative step (e.g., 1B, 10B, 100B, 1T, 10T). Small countries become visible while large countries remain in frame. The relationship is proportional, not absolute. The log scale must be clearly labeled because viewers may misread it as linear. If both views are useful, a dual-view approach (full range + zoomed detail) preserves linear meaning while serving both analytical goals.", concepts: ["log scale", "linear scale", "axis limits", "scale choice", "multiplicative growth"] },
          { scenario: "A student creates a histogram of diamond prices from the seaborn diamonds dataset using 5 bins. The distribution looks roughly bell-shaped and symmetric. A classmate uses 50 bins on the same data and sees a strongly right-skewed distribution with a sharp peak at low prices and a long tail. Both students present their histograms as 'the distribution of diamond prices.'", question: "Who is correct? Using bin resolution concepts from the course, explain what each histogram is showing and what the 'true' distribution looks like.", answer: "Neither is fully correct, but the 5-bin histogram is more misleading. With only 5 bins, the widely varying price values are lumped into five wide buckets. This under-resolution hides the right skew by averaging over large ranges, producing a falsely symmetric shape. The 50-bin version reveals actual structure: a concentration of lower-priced diamonds with a long right tail (many very expensive outliers). Diamond prices are known to be strongly right-skewed, so the 50-bin version is closer to reality. However, 50 bins may show noise alongside signal. A moderate resolution (15-25 bins) would likely best balance structure vs. noise. The lesson: defaults are guesses, and both students are presenting a design choice as if it were a fact. The 'true' distribution requires comparing multiple bin counts and justifying the choice. Bin choice should be intentional.", concepts: ["bins", "under-resolution", "over-resolution", "histogram", "skewness"] },
          { scenario: "An analyst builds an interactive dashboard for sales exploration. It includes: a bin count slider (5 to 100), a linear/log scale toggle, dropdowns for 8 different regional filters, and a date range slider. In user testing, sales reps say the tool is 'confusing' and they keep accidentally misleading themselves by toggling the log scale without realizing it.", question: "Using course concepts about interactivity, cognitive consequences, and design responsibility, diagnose the problems and redesign the interaction model.", answer: "Three problems: (1) Too many degrees of freedom. Four simultaneous interaction controls create decision fatigue and a combinatorial exploration space. Most users only test a few combinations, leading to anchoring on early states. (2) Log scale toggle without clear labeling is dangerous. The course principle: 'Never surprise the viewer.' If users toggle log scale without noticing, they misread distance as difference when it actually means ratio. Fix: make scale state permanently visible in the chart title or axis label. (3) The interaction is exposing instability: results that change dramatically with parameter tweaks signal fragility in the analysis. Redesign strategy: (a) Use progressive disclosure: show defaults that work well, put advanced controls behind an 'Advanced Options' toggle. (b) Set defaults that are analytically justified, not just convenient. (c) Make scale state explicit and persistent. (d) Reduce bin control to 3 presets (Low/Medium/High resolution) instead of a continuous slider. (e) Add a 'Reset to defaults' button. The principle: minimal viable interactivity, not maximal.", concepts: ["interactivity", "cognitive load", "anchoring bias", "log scale", "progressive disclosure"] },
        ],
      },

      // ─────────────────────────────────────────────────────────────────
      // WEEK 6 — Interactive Elements (2.16.26)
