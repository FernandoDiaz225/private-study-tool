      {
        id: "w6", label: "Week 6", subtitle: "Interactive Elements, Layout & Coordinate Systems", color: "#38bdf8",
        flashcards: [
          { q: "What is the core distinction between marks and layout in visualization?", a: "Marks encode data: they answer 'where is the data?' and 'what is its value?' Layout encodes structure: it answers 'how is it framed?', 'what is emphasized?', 'what is stable?', and 'what is interactive?' Marks live in the plot region. Layout lives everywhere else." },
          { q: "What are the four layout regions in a Plotly visualization?", a: "Margin Region (outer container, provides structural spacing, no data marks). Title Region (interpretive framing, first cognitive anchor, uses normalized coordinates). Control Region (buttons, sliders, modifies layout state not dataset). Plot Region (where data marks are rendered, axis scales define meaning, visually dominant). Legend Region (explains encoding choices, lives outside plot region, must not crowd data)." },
          { q: "What is the margin region and why is it 'structural infrastructure'?", a: "The margin region is the space between the plot region and the figure boundary. It contains title, controls, and legend; prevents overlap; is measured in pixels; does not contain marks; and controls global framing. Margins shrink or expand the plot region. They are not decoration \u2014 they define layout hierarchy." },
          { q: "What are the three coordinate systems used in Plotly layout?", a: "Pixels (absolute units): used for physical sizing, e.g., width=900, height=600, margin=dict(t=140). Normalized coordinates (0-1 relative space): used for positioning layout elements, e.g., title x=0.5 means centered. Data coordinates (axis values): used for placing marks, e.g., x='total_bill', affected by scale transformations." },
          { q: "How do normalized coordinates work in Plotly?", a: "0 = left or bottom, 1 = right or top. Values can exceed 1 to place elements outside the plot region. Relative to figure size, so they automatically adapt when figure dimensions change. Used for: title position (x=0.5, y=0.95), legend placement (x=1.02, y=0.5), and button/slider positioning (x=0.55, y=1.20 places controls above the plot)." },
          { q: "What is the conceptual role of data coordinates vs. layout coordinates?", a: "Data coordinates determine meaning: they define where marks are drawn based on actual data values, controlled by axis scale, affected by linear/log transformations. Layout coordinates determine structure: they position interface elements (titles, controls, legends) proportionally within the figure, independent from data values." },
          { q: "What does interactivity actually do, according to W6?", a: "Interactivity is parameter manipulation, view transformation, data transformation, perceptual reallocation, and interpretive negotiation. It's not a binary (static vs. interactive) but a degree of 'deferred commitment' vs. 'frozen commitment.' Interaction does not change data \u2014 it changes access. The architecture is: User Input \u2192 Function \u2192 Data Filter \u2192 Redraw \u2192 New State." },
          { q: "Why can't matplotlib be used for interactive visualization directly?", a: "Matplotlib is primarily static. Interactivity requires event-driven behavior: user input must trigger updates, which requires reactive frameworks. Interactivity is architectural, not cosmetic. Tool choice determines capability. New libraries like Plotly Express extend, not replace, static design fundamentals." },
          { q: "What is click selection in interactive visualization?", a: "Clicking highlights individual data points. The data does not change. The visual emphasis changes. Selection directs attention and creates local focus. Highlighting alters perception. The user becomes an active participant. Interactivity reallocates interpretive control. Multiple points can be selected with Shift in Plotly." },
          { q: "What is the difference between selection and filtering in interactive visualization?", a: "Selection: highlights specific observations without removing others from view. Data remains fully visible; only emphasis changes. Filtering: dynamically subsets the dataset (via sliders, dropdowns, category toggles). Context is temporarily removed. Filtering is a stronger interpretive act \u2014 it can hide patterns and simplify in ways that mislead." },
          { q: "What are pan and zoom and what do they risk?", a: "Panning shifts the visible region; zooming changes scale perception. The dataset remains unchanged. Context can disappear when you zoom in. Small patterns become visible, but large patterns may vanish. Navigation changes framing. The rule: always reset to full view before concluding. Never treat a zoomed view as the complete picture." },
          { q: "What is focus + context design and why is it preferable to simple zoom?", a: "Focus + context uses two panels: one for detail (increased precision) and one for full context (preserved structure). Both show identical data at different scales. This prevents distortion from pure zoom, where context disappears. The design principle: show detail AND maintain global structure. Design can replace interaction \u2014 intentional comparison supports trust." },
          { q: "What is view linking in interactive dashboards?", a: "Coordinated behavior across panels: linked highlighting, cross-filtering, shared scales. Shared axes enforce comparability and prevent accidental distortion. Inconsistent scales across linked panels mislead. Linking builds geometric discipline. If two panels invite comparison, they must either share axes or explicitly justify why they don't." },
          { q: "What is the 'first view anchoring effect' in interactive visualization?", a: "The first state users see shapes all subsequent interpretation. Defaults become implicit recommendations. Users rarely explore all parameter combinations. Interaction can amplify anchoring bias because users test combinations that confirm initial impressions. Design = choice architecture. Good defaults still matter even when everything is adjustable." },
          { q: "What are the design principles for good interactive systems?", a: "Start with clear defaults. Limit parameter space. Reveal complexity gradually (progressive disclosure). Keep scale consistent unless justified. Make state visible. Label controls clearly. Preserve interpretive stability. Reduce unnecessary options. Interaction should extend the static design, not add noise to it." },
          { q: "When is static visualization better than interactive?", a: "Small datasets with simple comparisons. Public reporting where audiences lack training. High-stakes decisions needing stable, authoritative results. When defaults already mislead (interaction won't fix bad design). When audience lacks interface literacy. When parameter tuning hides instability. When interaction increases noise. Static visualizations speak authoritatively; interactive visualizations speak conditionally." },
        ],
        trueFalse: [
          { s: "Marks in a visualization encode structure, while layout encodes data.", ans: false, e: "It's the opposite. Marks encode data (position, value). Layout encodes structure (framing, emphasis, hierarchy, interaction state). Marks live in the plot region; layout lives everywhere else including margins, title region, and control region." },
          { s: "The margin region in Plotly contains data marks and is where plots are drawn.", ans: false, e: "The margin region is the structural space between the plot region and the figure boundary. It contains title, controls, and legend \u2014 but never data marks. Data marks are rendered in the plot region only." },
          { s: "In Plotly normalized coordinates, a value of x=1.02 places an element slightly outside the right edge of the figure.", ans: true, e: "Normalized coordinates go from 0 (left/bottom) to 1 (right/top). Values exceeding 1 push elements beyond the figure boundary. x=1.02 is used for legend placement to position it just to the right of the plot region." },
          { s: "Data coordinates in Plotly are used to position layout elements like titles and legends.", ans: false, e: "Data coordinates are for placing data marks. They're controlled by axis scale and affected by linear/log transformations. Layout elements (titles, legends, controls) are positioned using normalized coordinates (0-1 relative space)." },
          { s: "Interactivity changes the underlying data when users interact with filters and sliders.", ans: false, e: "Interaction does not change data \u2014 it changes access. Filtering changes which data is visible, not the dataset itself. The architecture is: User Input \u2192 Function \u2192 Data Filter \u2192 Redraw \u2192 New State. The original data remains constant." },
          { s: "Click selection in Plotly removes unselected data points from the visualization.", ans: false, e: "Selection highlights specific observations without removing others from view. The data stays fully visible; only emphasis changes. Filtering (via sliders or dropdowns) is what actually subsets the visible data." },
          { s: "Pan and zoom change the dataset being visualized.", ans: false, e: "Pan and zoom change framing, not data. The dataset remains unchanged. Panning shifts the visible region; zooming changes scale perception. The risk is that context disappears \u2014 always reset to full view before drawing conclusions." },
          { s: "Focus + context design uses two views: one for detail and one for full context, both showing the same data.", ans: true, e: "This is the core principle of focus + context: show fine detail in one panel and global structure in another. Both represent the same dataset. This prevents the loss of context that happens with simple zoom." },
          { s: "Shared axes across linked panels are optional if each panel has different data ranges.", ans: false, e: "When two panels invite comparison, shared axes are required unless explicitly justified otherwise. Inconsistent scales mislead viewers who assume comparability from spatial proximity. This is a subplot discipline requirement." },
          { s: "margin=dict(t=140) in Plotly sets the top margin to 140 normalized units.", ans: false, e: "Margin values use pixels (absolute units), not normalized coordinates. margin=dict(t=140) sets the top margin to 140 pixels. Pixel values are for physical sizing; normalized coordinates (0-1) are for positioning layout elements inside the figure." },
          { s: "According to W6, interactive visualization is always preferable to static because it gives users more control.", ans: false, e: "Static visualization is preferable for public reporting, high-stakes decisions, small datasets, and when audiences lack training. Static visuals speak authoritatively. Interactive visuals speak conditionally. More control does not mean better outcomes." },
          { s: "Progressive disclosure helps manage cognitive load by revealing all controls at once for maximum transparency.", ans: false, e: "Progressive disclosure means revealing complexity gradually, not all at once. Starting with the most important controls and showing advanced options only when needed limits competing attention and reduces decision fatigue." },
        ],
        scenarios: [
          { scenario: "A student builds a Plotly dashboard and places a dropdown menu at coordinates x=0.5, y=1.20. The title is placed at x=0.5, y=0.95. The legend is placed at x=1.02, y=0.5. The student notices the dropdown overlaps the title when the figure is resized.", question: "Using Plotly coordinate system concepts from W6, explain why this overlap occurs and how to fix it.", answer: "The overlap happens because both the dropdown (y=1.20) and the title (y=0.95) use normalized coordinates relative to the figure size. When the figure shrinks, these positions remain proportionally fixed but the physical space between y=0.95 and y=1.20 decreases, causing the elements to appear closer or overlap. The title is near the top of the figure interior (y=0.95) and the dropdown is above it (y=1.20), but insufficient vertical separation exists at small figure heights. Fixes: (1) Increase the top margin using margin=dict(t=160) or higher \u2014 this creates more physical pixel space above the plot region for layout elements. (2) Move the title lower (y=0.88) or the dropdown higher (y=1.35) to increase separation. (3) Use a fixed minimum height for the figure to prevent the collision. The principle: pixel margins control how much physical room exists; normalized coordinates position elements within that room. Both must be coordinated deliberately.", concepts: ["normalized coordinates", "pixel margins", "layout regions", "title region", "control region"] },
          { scenario: "A student creates a Plotly dashboard comparing tips by day. They add a category filter dropdown and a range slider for total_bill. After user testing, a classmate says: 'I keep filtering to just Saturday and then the slider changes the picture completely \u2014 I'm not sure what I'm actually looking at.'", question: "Using W6 interaction concepts, diagnose what is happening and what design principles the student should apply.", answer: "Two issues: (1) Multi-condition filtering is creating a combinatorial interpretation problem. When a user filters to Saturday AND adjusts the bill slider, they are viewing a doubly constrained subset. The initial filter anchors their interpretation, and the slider adds a second layer that alters the visible pattern. The user is experiencing the consequence of an under-labeled state: they don't know what constraints are currently active. (2) Context is being removed without being shown. When Saturday is selected, the comparison to other days disappears, making pattern evaluation harder. Fixes: (1) Make state visible: display active filter conditions persistently in the chart title or an annotation (e.g., 'Showing: Saturday | Bills 10-40'). (2) Add a 'Reset to defaults' button that clears all filters at once. (3) Consider a focus + context design: one panel showing the filtered view and one showing the full distribution for reference. The principle: more controls do not mean more understanding. Every added filter multiplies the interpretive paths users must manage.", concepts: ["filtering", "state visibility", "multi-condition filtering", "anchoring bias", "focus + context"] },
          { scenario: "A student uses plt.subplots(1, 2) to create two side-by-side Plotly scatter plots comparing total_bill vs. tip for lunch and dinner separately. Both plots show the same data range but the student does not set sharey=True or manually set the y-axis limits. A viewer concludes that lunch tips are 'basically the same spread' as dinner tips.", question: "What layout and encoding discipline issues exist here? How does W6 address this?", answer: "The core problem is subplot discipline failure. Without shared y-axes, the two panels independently auto-scale based on their respective data ranges. If dinner tips have a wider spread, the y-axis expands to accommodate. If lunch tips are narrower, the y-axis compresses. Both panels now show different scales visually appearing equal. The viewer's conclusion is an artifact of auto-scaling, not a real finding. W6's subplot discipline requirement: if two views invite comparison, you must share axes or explicitly justify why they're independent. Fix: use sharey=True in plt.subplots() or manually set identical y-axis limits for both Plotly figures (yaxis=dict(range=[0, 12])). Additionally, if color encodes the meal period across both panels, the color mapping must be consistent \u2014 don't use orange for dinner in one panel and blue in another. Redundant legends should be removed if the color is already labeled in the title. The design principle: visual proximity implies comparability. Inconsistent scales are deceptive even when unintentional.", concepts: ["sharey", "shared axes", "subplot discipline", "comparison integrity", "auto-scaling"] },
        ],
      },

      // ─────────────────────────────────────────────────────────────────
      // WEEK 7 — Multi-View Analytical Systems Challenge (2.23.26)
      // ─────────────────────────────────────────────────────────────────
      {
        id: "w7", label: "Week 7", subtitle: "Multi-View Systems & Dashboard Architecture", color: "#fb7185",
        flashcards: [
          { q: "What is the core premise of a multi-view analytical system?", a: "You are not building charts \u2014 you are designing a coherent analytical interface that makes an argument about structural relationships in the data. A dashboard must: coordinate multiple epistemic views, manage shared state, introduce interpretive instability, remain cognitively disciplined, and embody (not merely state) a thesis." },
          { q: "What are the three required view types in a multi-view analytical system?", a: "Micro-level view: exposes individual observations (e.g., scatter, jittered strip). Must encode at least two quantitative variables and include one categorical encoding. Distributional/density-based view: reveals structural shape (e.g., histogram, KDE, violin). Must expose shape sensitivity and change when global state changes. Abstracted/aggregated view: compresses complexity (e.g., mean by group, trend, heatmap). Must aggregate, reduce, or summarize in a way that hides microstructure." },
          { q: "What is a 'micro-level view' and what must it do?", a: "A view that exposes individual observations. Examples: scatter plot, jittered strip plot, linked point series. Requirements: encode at least two quantitative variables, include one categorical encoding (or justify its absence), support fine-grained inspection of individual data points. Its epistemic role is revealing what the data looks like at the observation level." },
          { q: "What is a 'distributional view' and what must it do?", a: "A view that reveals structural shape. Examples: KDE, histogram with tunable bins, ECDF, violin, ridgeline. Requirements: expose shape sensitivity (bins, smoothing, bandwidth instability), change when global state changes. Its epistemic role is showing the distribution's architecture \u2014 peaks, gaps, skew, spread \u2014 not just individual points." },
          { q: "What is an 'abstracted/aggregated view' and what must it do?", a: "A view that compresses complexity. Examples: mean/median by origin, year trend, correlation heatmap, cylinder efficiency comparison. Requirements: aggregate, reduce, or summarize in a way that hides microstructure by design. Its epistemic role is the opposite of the micro view: it sacrifices detail for comparability and pattern clarity." },
          { q: "What is a 'structural interaction' and why does filtering alone not count?", a: "A structural interaction changes interpretation, not just which data is visible. Examples: scale toggle (log/linear), aggregation rule change (mean vs. median), binning resolution, density bandwidth, encoding logic. Filtering alone does NOT count because it only subsets data without altering the perceptual or analytical structure. A structural interaction must alter how viewers interpret the data, not just what data is shown." },
          { q: "What is a 'cross-panel state interaction'?", a: "An interaction that propagates shared state across at least two panels. Examples: origin selection updates scatter + distribution + summary simultaneously. Brushing in scatter updates density + aggregated summary. Year slider updates trend + micro view. Teams must be able to articulate the global state model: what is the state variable, which views depend on it, and what re-renders." },
          { q: "What is the 'global state model' in a multi-view system?", a: "Before building, explicitly define: what state variables exist (e.g., selected_origin, horsepower_threshold, scale_mode). Which views depend on which state. What re-renders when state changes. What does NOT re-render. If you cannot explain state propagation, the dashboard is architecturally weak. State management is design, not implementation detail." },
          { q: "What is 'epistemic role' and why must each view have a distinct one?", a: "Epistemic role is the analytical function a view serves \u2014 what kind of knowledge it produces. Micro view produces observation-level knowledge. Distribution view produces shape knowledge. Aggregated view produces summary knowledge. Each role must be distinct: if two panels answer the same question, one is redundant and the system is architecturally weak. Removing one panel should materially weaken the argument." },
          { q: "What is the 'narrative embodiment requirement' in a multi-view dashboard?", a: "You cannot simply write a paragraph explaining your dashboard. The thesis must be visually legible from the layout itself. After presenting, you must state: (1) What is your core claim? (2) Which view carries the argumentative weight? (3) Where does interpretation become unstable? (4) What is the most misleading default state you avoided?" },
          { q: "What are the prohibited shortcuts in multi-view dashboard design?", a: "No isolated panels that don't participate in state. No decorative animations. No redundant encodings (color + facet + shape for same variable). No adding interaction that does not alter meaning. No 3D. No unnecessary legends. These prohibitions enforce that every design decision must earn its place analytically, not aesthetically." },
          { q: "What is 'interpretive instability' and why must a good dashboard introduce it?", a: "Interpretive instability is the honest acknowledgment that the data can support multiple readings depending on parameter choices (bins, scale, aggregation). A good dashboard surfaces this instability rather than hiding it. This is accomplished through structural interactions (scale toggles, bin sliders) that visibly change what patterns appear. Hiding instability is misleading; surfacing it builds analytical trust." },
          { q: "What does the subplot discipline requirement say about shared axes?", a: "If two views invite comparison, you must either: share axes (so visual bar/point height directly encodes comparable values) OR justify explicitly why axes are intentionally independent. Additionally: color mapping must be consistent across panels for the same variable. Redundant legends must be removed unless justified. Inconsistent axes and colors silently corrupt comparisons." },
          { q: "What is 'system initialization' in a multi-view dashboard, and what does it require?", a: "Before building any visual components, you must establish an analytical foundation: load and inspect the dataset, examine variable types and dimensions, define your analytical scope (2-3 sentences: what structural question, which variables are central, which are contextual), declare preprocessing decisions with code + justification + resulting dimensions, and declare global state variables. Architecture must reflect intention, not post-hoc adjustment." },
          { q: "What distinguishes a score of 4 vs. score of 1 on System Architecture in the peer rubric?", a: "Score 4 (Architecturally Strong): each panel has a distinct epistemic role, panels depend on one another, removing one would materially weaken the argument. Score 1 (Decorative): three separate charts placed together with no structural relationship. The distinction is whether the panels form an integrated analytical system or are just co-located visuals." },
          { q: "What distinguishes a score of 4 vs. score of 1 on Argument Clarity in the peer rubric?", a: "Score 4: thesis is visually legible, interpretive tension embedded in layout, design is restrained and cognitively clean, clear awareness of potential misinterpretation. Score 1: no clear claim or chaotic design. The distinction is whether the argument is built into the visual architecture or only exists in the designer's head." },
        ],
        trueFalse: [
          { s: "In a multi-view system, three separate charts placed together with no shared state qualifies as a coordinated analytical system.", ans: false, e: "Three separate charts with no shared state is the lowest possible architecture (score 1). A coordinated system requires panels that depend on each other through shared state, where removing one would materially weaken the argument." },
          { s: "A structural interaction must alter interpretation, not just which data is visible.", ans: true, e: "Filtering alone (which only subsets visible data) does NOT count as a structural interaction. Structural interactions change scale, aggregation rule, binning resolution, density bandwidth, or encoding logic \u2014 things that alter how viewers interpret the data, not just what data they see." },
          { s: "The micro-level view in a three-view system can skip categorical encoding if the data is purely quantitative.", ans: true, e: "The requirement is to 'include one categorical encoding OR justify its absence.' If the analytical question is purely about quantitative structure, a justified absence is acceptable. The key is intentional design, not checkbox compliance." },
          { s: "A cross-panel interaction only counts if it updates all three panels simultaneously.", ans: false, e: "A cross-panel state interaction must change at least two panels and propagate shared state. Updating all three is possible but not required. The core requirement is that the interaction is explainable in terms of dependency: which state variable changed and which views depend on it." },
          { s: "The narrative embodiment requirement is satisfied by writing a clear paragraph explaining the dashboard's purpose.", ans: false, e: "You may not simply write a paragraph. The thesis must be visually legible from the layout itself. A written paragraph is necessary but not sufficient \u2014 the visual argument must stand independently of verbal explanation." },
          { s: "Using color, facet, and shape simultaneously to encode the same variable is acceptable if it makes the chart more readable.", ans: false, e: "Redundant encodings (color + facet + shape for the same variable) are explicitly prohibited. Each encoding channel should carry unique information. Redundancy adds visual complexity without analytical benefit and is treated as a design failure." },
          { s: "If two panels invite comparison, they must share axes unless there is a justified reason for independence.", ans: true, e: "This is the subplot discipline requirement from W7. Shared axes prevent accidental scale distortion when viewers assume comparability from visual proximity. If axes are intentionally independent, the justification must be explicit." },
          { s: "Declaring global state variables before building is optional if the team builds views first and figures out state later.", ans: false, e: "Global state must be declared before construction. Architecture must reflect intention rather than post-hoc adjustment. You may not change your central analytical question after beginning. This ensures the system's structure reflects deliberate design, not emergent guessing." },
          { s: "The abstracted/aggregated view should preserve as much individual observation detail as possible.", ans: false, e: "The aggregated view's explicit role is to hide microstructure by design. It compresses complexity through aggregation, reduction, or summarization. Preserving individual detail is the micro-level view's job. Each view has a distinct epistemic role." },
          { s: "Interpretive instability in a dashboard is a design flaw that should be eliminated.", ans: false, e: "Interpretive instability is intentional and required. It is the honest acknowledgment that data supports multiple readings. Surfacing instability (through scale toggles, bin sliders) builds analytical trust. Hiding instability is misleading. A score of 4 on Analytical Depth requires acknowledging shape sensitivity." },
          { s: "A team that can clearly explain global state, dependencies, and re-render logic scores higher on Interaction rubric.", ans: true, e: "The Interaction rubric (score 4) explicitly requires: one structural interaction, one cross-panel interaction, and a clear explanation of global state and dependencies. Teams that cannot explain state propagation have architecturally weak dashboards regardless of how many interactions they implement." },
          { s: "The distributional view must remain static and cannot change when other dashboard interactions are triggered.", ans: false, e: "The opposite is required. The distributional view must change when global state changes. It is supposed to expose shape sensitivity and respond to cross-panel interactions. A distribution that doesn't react to state is an isolated panel that fails the coordination requirement." },
        ],
        scenarios: [
          { scenario: "A team builds a three-view dashboard on the mpg dataset. View 1 is a scatter plot of horsepower vs. mpg colored by origin. View 2 is a histogram of mpg with a fixed 10-bin count. View 3 is a bar chart showing mean mpg by origin. The only interaction is a dropdown filter for origin that updates all three views. In peer review, the team receives a score of 2 on Interaction.", question: "Why did the team score a 2 instead of a 4? What specific changes would bring the interaction score to a 4?", answer: "Score of 2 reflects: interaction exists but is shallow. The origin dropdown is a filtering interaction, not a structural interaction. Per the W7 requirements, filtering alone does NOT count as a structural interaction. The team is missing: (A) One structural interaction that changes interpretation \u2014 examples: a log/linear scale toggle for the scatter plot (changes whether viewers see linear or proportional relationships), a bin resolution slider for the histogram (exposes shape sensitivity), or a mean vs. median toggle for the bar chart (changes the aggregation rule). (B) Clear state model articulation \u2014 they need to explain what re-renders vs. what doesn't. To reach score 4: add one of the structural interactions above, ensure it changes interpretation not just display, articulate the full global state model (state variables, dependencies, re-render logic), and demonstrate that the distributional view changes shape when structural parameters change.", concepts: ["structural interaction", "filtering vs. structural interaction", "global state model", "cross-panel interaction", "interaction rubric"] },
          { scenario: "A team's dashboard shows a scatter (horsepower vs. mpg, colored by origin), a KDE plot of mpg distribution by origin, and a summary table of mean/median/std by origin. The scatter uses 'USA' in blue, 'Japan' in orange, 'Europe' in green. The KDE uses 'USA' in red, 'Japan' in blue, 'Europe' in purple. Each panel has its own origin legend.", question: "Identify the encoding discipline violations and explain how to fix them for the final submission.", answer: "Three violations: (1) Inconsistent color mapping across panels. 'USA' is blue in the scatter but red in the KDE. 'Japan' is orange in the scatter but blue in the KDE. This forces viewers to re-learn the color encoding for each panel, increasing cognitive load and breaking cross-panel comparability. Fix: define a consistent color palette at the start and apply it identically across all views. (2) Redundant legends. Each panel has its own origin legend for the same categorical variable. Per W7's subplot discipline requirement, redundant legends must be removed unless justified. If the color mapping is consistent and visible in a single shared legend, per-panel legends are noise. Fix: use one shared legend, positioned in the margin region. (3) Potentially justified: if the design intentionally uses independent color for analytical reasons, the justification must be explicit and defensible in the peer review. Without justification, this fails encoding discipline (score 2 range).", concepts: ["color mapping consistency", "redundant legends", "encoding discipline", "subplot discipline", "cognitive load"] },
          { scenario: "A team presents their dashboard and is asked: 'What is your core claim? Which view carries the argumentative weight? Where does interpretation become unstable?' The team says: 'Our claim is that origin affects mpg. All three views are equally important. The interpretation is pretty stable.'", question: "Using the narrative embodiment requirement from W7, critique this response and explain what a score-4 response would look like.", answer: "This response fails the narrative embodiment requirement on all three counts. (1) 'Origin affects mpg' is a weak claim. A score-4 claim is specific and structurally arguable from the layout: 'Japanese vehicles achieve higher mpg than American vehicles across all displacement sizes, but this relationship disappears when controlling for model year' is a claim that requires the specific architecture of the dashboard to be legible. (2) 'All three views equally important' suggests no argumentative architecture. Score 4 requires identifying which view carries the primary weight. If the scatter plot exposes the key relationship, say so. If the distribution view reveals that the aggregate claim hides bimodal structure, say so. The view hierarchy should be visible in the layout itself (size, position, emphasis). (3) 'Interpretation is stable' is the opposite of what's required. Score 4 requires surfacing interpretive instability: 'Our most unstable reading is in the distribution view, where changing from 10 to 30 bins reveals a bimodal structure in USA mpg that disappears at lower resolution. Our most misleading default would have been a linear scale, which hides the multiplicative relationship between displacement and mpg.' A complete answer names instability, not denies it.", concepts: ["narrative embodiment", "epistemic role", "interpretive instability", "argumentative weight", "analytical depth"] },
        ],
      },

      {
        id: "w1", label: "Week 1", subtitle: "Foundations of HCI", color: "#fb923c",
        flashcards: [
          // Boeing 737 MAX Case Study
          { q: "What is the Boeing 737 MAX case study used to illustrate in this course?", a: "It illustrates how correct software can fail when it meets human limits. Two crashes occurred not because of a software bug, but because of an interaction design failure \u2014 MCAS acted without clear communication to pilots, creating an interface gap." },
          { q: "What is MCAS?", a: "Maneuvering Characteristics Augmentation System. A software system embedded in the flight control computer that automatically adjusts aircraft pitch to make the 737 MAX feel like earlier 737 models during certain flight conditions." },
          { q: "When does MCAS activate?", a: "When the aircraft is in manual flight, flaps are retracted, and the system detects a high Angle of Attack (AoA). AoA is the angle between the wing and oncoming airflow \u2014 high AoA can indicate an impending stall." },
          { q: "What does MCAS actually do when activated?", a: "It commands the horizontal stabilizer to push the aircraft nose downward, and repeats this action if high AoA persists. This happens without pilot request, without a dedicated MCAS alert, and without clearly stating why the nose is moving." },
          { q: "What was the key engineering constraint Boeing faced?", a: "Three competing pressures: (1) preserve familiar 737 handling, (2) avoid expensive pilot retraining, (3) compete rapidly with Airbus. The solution was software (MCAS) rather than hardware redesign." },
          { q: "What is the 'interface problem' with MCAS?", a: "From the pilot's perspective: the control column resists input, the aircraft trims nose-down repeatedly, and alerts are fragmented and indirect. The pilot sees effects but not system intent \u2014 this is an interface gap." },
          { q: "What is an 'authority inversion' in HCI?", a: "When the system decides first and the human reacts later. Before MCAS, pilot inputs directly shaped aircraft behavior. With MCAS, sensor inference could override pilot intent. Designing this inversion is an HCI responsibility." },
          { q: "Why was training alone insufficient for the MCAS problem?", a: "The issue wasn't pilot knowledge \u2014 it was limited system transparency, high cognitive load during takeoff, and time-critical decision windows. Training cannot compensate for unclear system state and ambiguous control authority. Interfaces must carry that burden." },
          { q: "What is 'underspecified behavior' vs. 'hidden behavior'?", a: "MCAS's behavior was not hidden \u2014 it was underspecified. The system's actions were documented but not clearly communicated through the interface in real-time. Pilots couldn't see what the system was doing or why." },
          { q: "When does automation assist effectively?", a: "When its goals are visible, its limits are legible, and its behavior can be predicted. MCAS failed because it intervened without becoming an object of interaction \u2014 like an invisible co-pilot without shared context." },
          { q: "What pattern should you notice from the Boeing case?", a: "This pattern appears whenever systems predict user behavior, act before confirmation, and minimize visible interfaces. As systems become more intelligent, interfaces often become thinner \u2014 that is dangerous." },
          // HCI Fundamentals
          { q: "What does HCI study?", a: "Human\u2013Computer Interaction examines how people perceive, interpret, and act when interacting with computational systems \u2014 not in ideal conditions, but under real cognitive limits, imperfect attention, and limited time." },

// ─── HELPERS ───
function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── LOCAL STORAGE ───
function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}
function loadData(key, fallback) {
  try {
    const d = localStorage.getItem(key);
    return d ? JSON.parse(d) : fallback;
  } catch(e) { return fallback; }
}
function clearData(key) {
  try { localStorage.removeItem(key); } catch(e) {}
}

// ─── FLASHCARD MODE ───
function FlashcardMode({ cards, moduleColor, moduleId }) {
  const storageKey = moduleId + "_fc_status";
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [status, setStatus] = useState(() => loadData(storageKey, {}));
  const [filter, setFilter] = useState("all"); // "all" | "unseen" | "review" | "got"
  const [isShuffled, setIsShuffled] = useState(false);
  const hasMounted = useRef(false);
  const prevFilter = useRef("all");
  const prevShuffle = useRef(false);

  // Persist status changes (skip first render)
  useEffect(() => {
    if (hasMounted.current) { saveData(storageKey, status); }
    else { hasMounted.current = true; }
  }, [status, storageKey]);

  // Compute display cards from current state (no useEffect, just derived state)
  const displayCards = (() => {
    let filtered;
    if (filter === "unseen") {
      filtered = cards.filter((_, i) => !status[i]);
    } else if (filter === "review") {
      filtered = cards.filter((_, i) => status[i] === "review");
    } else if (filter === "got") {
      filtered = cards.filter((_, i) => status[i] === "got");
    } else {
      filtered = [...cards];
    }
    if (isShuffled) filtered = shuffleArr(filtered);
    return filtered;
  })();

  // Only reset index when filter or shuffle CHANGES (not on every mark)
  useEffect(() => {
    if (prevFilter.current !== filter || prevShuffle.current !== isShuffled) {
      setIndex(0);
      setFlipped(false);
      prevFilter.current = filter;
      prevShuffle.current = isShuffled;
    }
  }, [filter, isShuffled]);

  // Clamp index to valid range
  const safeIndex = displayCards.length === 0 ? 0 : Math.min(index, displayCards.length - 1);
  if (safeIndex !== index) {
    // Schedule a state update but use safeIndex for this render
  }
  const current = displayCards[safeIndex];
  const gotCount = Object.values(status).filter(v => v === "got").length;
  const reviewCount = Object.values(status).filter(v => v === "review").length;
  const unseenCount = cards.length - gotCount - reviewCount;
  const origIndex = current ? cards.indexOf(current) : -1;

  // Sync state if index drifted out of bounds
  useEffect(() => {
    if (displayCards.length > 0 && index >= displayCards.length) {
      setIndex(displayCards.length - 1);
      setFlipped(false);
    }
  }, [displayCards.length, index]);

  const go = useCallback((dir) => {
    setFlipped(false);
    setIndex(p => Math.max(0, Math.min(displayCards.length - 1, p + dir)));
  }, [displayCards.length]);

  const markCard = useCallback((markType) => {
    if (origIndex === -1) return;
    setStatus(s => ({...s, [origIndex]: markType}));
    setFlipped(false);
    // In "all" view, advance to next card
    if (filter === "all") {
      setIndex(p => Math.min(p + 1, displayCards.length - 1));
    }
    // In filtered views, the card will leave the list on next render.
    // If we're at the end, the safeIndex clamp handles it.
  }, [origIndex, filter, displayCards.length]);

  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.code === "Space") { e.preventDefault(); setFlipped(f => !f); }
      if (e.code === "ArrowRight" || e.code === "ArrowDown") { e.preventDefault(); go(1); }
      if (e.code === "ArrowLeft" || e.code === "ArrowUp") { e.preventDefault(); go(-1); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [go]);

  if (displayCards.length === 0) {
    const msg = filter === "unseen" ? "You've seen every card!" : filter === "review" ? "No cards marked for review!" : filter === "got" ? "No cards marked as got it yet!" : "No cards available.";
    return React.createElement("div", { className: "empty-state" },
      React.createElement("p", null, msg),
      React.createElement("div", { style: { display: "flex", gap: 10, justifyContent: "center", marginTop: 20 } },
        React.createElement("button", { className: "btn", style: { borderColor: moduleColor, color: moduleColor }, onClick: () => setFilter("all") }, "Show All Cards"),
        React.createElement("button", { className: "btn danger", onClick: () => { setFilter("all"); setStatus({}); clearData(storageKey); } }, "Reset Progress")
      )
    );
  }

  const filterBtn = (label, value, count, color) => React.createElement("button", {
    className: "chip",
    style: { borderColor: color, color: color, background: filter === value ? color + "25" : "transparent", fontWeight: filter === value ? 700 : 400 },
    onClick: () => setFilter(f => f === value ? "all" : value)
  }, `${label} (${count})`);

  return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 20 } },
    React.createElement("div", { className: "controls" },
      React.createElement("button", { className: "chip", style: { borderColor: moduleColor, color: moduleColor, background: isShuffled ? moduleColor + "30" : "transparent" }, onClick: () => setIsShuffled(s => !s) }, isShuffled ? "\u27f3 Shuffled" : "\u27f3 Shuffle"),
      filterBtn("Unseen", "unseen", unseenCount, "#64748b"),
      filterBtn("Review", "review", reviewCount, "#f59e0b"),
      filterBtn("Got it", "got", gotCount, "#22c55e"),
      React.createElement("span", { className: "controls-info" }, `${safeIndex + 1}/${displayCards.length}${filter !== "all" ? " (" + filter + ")" : ""}`)
    ),
    React.createElement("div", { className: `card${flipped ? " flipped" : ""}`, style: { "--mc": moduleColor, "--mc08": moduleColor + "12", "--mc15": moduleColor + "25" }, onClick: () => setFlipped(f => !f) },
      React.createElement("div", { className: "card-label" }, flipped ? "Answer" : "Question"),
      React.createElement("div", { className: "card-hint" }, "[space] to flip"),
      React.createElement("p", { className: "card-text" }, flipped ? current.a : current.q),
      origIndex !== -1 && status[origIndex] && React.createElement("div", { className: `card-status ${status[origIndex]}` }, status[origIndex] === "got" ? "\u2713 Got it" : "\u2605 Review")
    ),
    React.createElement("div", { className: "nav-row" },
      React.createElement("button", { className: "btn", disabled: safeIndex === 0, onClick: () => go(-1) }, "\u2190 Prev"),
      React.createElement("button", { className: "btn got", onClick: () => markCard("got") }, "\u2713 Got it"),
      React.createElement("button", { className: "btn review-btn", onClick: () => markCard("review") }, "\u2605 Review"),
      React.createElement("button", { className: "btn", disabled: safeIndex === displayCards.length - 1, onClick: () => go(1) }, "Next \u2192")
    ),
    React.createElement("div", { className: "shortcut-hint" }, "\u2190 \u2192 to navigate \u00b7 space to flip \u00b7 click filter to toggle")
  );
}

// ─── T/F MODE ───
function TFMode({ questions, moduleColor, moduleId }) {
  const storageKey = moduleId + "_tf_answers";

  const [answered, setAnswered] = useState(() => loadData(storageKey, {}));
  const [retryMode, setRetryMode] = useState(false);
  const [displayQs, setDisplayQs] = useState(questions);
  const hasMounted = useRef(false);

  // Persist answers (skip first render, skip retry mode)
  useEffect(() => {
    if (hasMounted.current && !retryMode) { saveData(storageKey, answered); }
    else { hasMounted.current = true; }
  }, [answered, storageKey, retryMode]);

  useEffect(() => {
    if (retryMode) {
      const missed = questions.filter((_, i) => answered[i] !== undefined && answered[i] !== questions[i].ans);
      setDisplayQs(missed);
      setIndex(0);
      setAnswered({});
    } else {
      setDisplayQs(questions);
    }
  }, [retryMode]);

  const current = displayQs[index];
  const totalAnswered = Object.keys(answered).length;
  const correct = Object.entries(answered).filter(([i, v]) => displayQs[parseInt(i)]?.ans === v).length;
  const isAnswered = answered[index] !== undefined;
  const isCorrect = isAnswered && answered[index] === current?.ans;

  const answer = useCallback((val) => {
    if (answered[index] !== undefined) return;
    setAnswered(a => ({...a, [index]: val}));
  }, [index, answered]);

  const next = useCallback(() => { if (index < displayQs.length - 1) setIndex(i => i + 1); }, [index, displayQs.length]);
  const prev = useCallback(() => { if (index > 0) setIndex(i => i - 1); }, [index]);

  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

      if ((e.key === "f" || e.key === "F") && !isAnswered) { e.preventDefault(); answer(false); }
      if (e.code === "ArrowRight") { e.preventDefault(); next(); }
      if (e.code === "ArrowLeft") { e.preventDefault(); prev(); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [answer, next, prev, isAnswered]);

  if (displayQs.length === 0) {
    return React.createElement("div", { className: "empty-state" },
      React.createElement("p", null, "No missed questions to retry!"),
      React.createElement("button", { className: "btn accent", style: { marginTop: 20 }, onClick: () => { setRetryMode(false); setAnswered({}); clearData(storageKey); } }, "Start Over")
    );
  }

  const allDone = totalAnswered === displayQs.length;
  const missedCount = allDone ? displayQs.filter((q, i) => answered[i] !== q.ans).length : 0;

  return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 16 } },
    React.createElement("div", { className: "score-bar" },
      React.createElement("span", { className: "score-text" }, "Score: ", React.createElement("span", { className: "num" }, correct), "/", totalAnswered, " correct"),
      React.createElement("span", { className: "score-sep" }, "\u00b7"),
      React.createElement("span", { className: "score-pos" }, `Q ${index + 1} of ${displayQs.length}`),
      allDone && missedCount > 0 && React.createElement("button", { className: "chip", style: { borderColor: "#ef4444", color: "#ef4444", background: "#ef444420" }, onClick: () => setRetryMode(true) }, `Retry ${missedCount} missed`),
      (retryMode || allDone) && React.createElement("button", { className: "chip", style: { borderColor: moduleColor, color: moduleColor }, onClick: () => { setRetryMode(false); setAnswered({}); setIndex(0); clearData(storageKey); } }, "Reset All")
    ),
    React.createElement("div", { className: "progress-bar" },
      React.createElement("div", { className: "progress-fill", style: { width: `${(totalAnswered / displayQs.length) * 100}%` } })
    ),
    React.createElement("div", { className: `tf-card${isAnswered ? (isCorrect ? " correct-border" : " wrong-border") : ""}` },
      React.createElement("div", { style: { fontSize: 11, color: "#475569", letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace" } }, "True or False?"),
      React.createElement("p", { style: { fontSize: 18, lineHeight: 1.65, color: "#f1f5f9", fontFamily: "'Source Serif 4', Georgia, serif" } }, current.s),
      isAnswered && React.createElement("div", { className: `explanation ${isCorrect ? "correct" : "wrong"}` },
        React.createElement("div", { className: `explanation-title ${isCorrect ? "correct" : "wrong"}` }, isCorrect ? "\u2713 Correct!" : `\u2717 Incorrect \u2014 Answer: ${current.ans ? "TRUE" : "FALSE"}`),
        React.createElement("p", null, current.e)
      )
    ),
    React.createElement("div", { className: "nav-row" },
      React.createElement("button", { className: "btn", disabled: index === 0, onClick: prev }, "\u2190 Prev"),
      React.createElement("button", { className: `btn true-btn${isAnswered && current.ans === true ? " correct" : ""}`, disabled: isAnswered, onClick: () => answer(true) }, "TRUE (T)"),
      React.createElement("button", { className: `btn false-btn${isAnswered && current.ans === false ? " correct" : ""}`, disabled: isAnswered, onClick: () => answer(false) }, "FALSE (F)"),
      React.createElement("button", { className: "btn", disabled: index === displayQs.length - 1, onClick: next }, "Next \u2192")
    ),
    React.createElement("div", { className: "shortcut-hint" }, "T / F to answer \u00b7 \u2190 \u2192 to navigate")
  );
}

// ─── SCENARIO PRACTICE MODE ───
function ScenarioMode({ scenarios, moduleColor, moduleId }) {
  const storageKey = moduleId + "_sc_progress";
  const [index, setIndex] = useState(0);
  const [revealed, setRevealed] = useState({});
  const [notes, setNotes] = useState(() => loadData(storageKey, {}));
  const hasMounted = useRef(false);

  useEffect(() => {
    if (hasMounted.current) { saveData(storageKey, notes); }
    else { hasMounted.current = true; }
  }, [notes, storageKey]);

  const current = scenarios[index];
  const revealedCount = Object.keys(revealed).length;

  const go = useCallback((dir) => {
    setIndex(p => Math.max(0, Math.min(scenarios.length - 1, p + dir)));
  }, [scenarios.length]);

  if (scenarios.length === 0) {
    return React.createElement("div", { className: "empty-state" },
      React.createElement("p", null, "No scenario practice questions yet for this module.")
    );
  }

  return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 20 } },
    React.createElement("div", { className: "score-bar" },
      React.createElement("span", { className: "score-pos" }, `Scenario ${index + 1} of ${scenarios.length}`),
      React.createElement("span", { className: "score-sep" }, "\u00b7"),
      React.createElement("span", { className: "score-text" }, `${revealedCount} reviewed`)
    ),
    React.createElement("div", { className: "scenario-card" },
      React.createElement("div", { className: "scenario-label" }, "Scenario"),
      React.createElement("div", { className: "scenario-text" }, current.scenario),
      React.createElement("div", { className: "scenario-prompt" }, current.question),
      React.createElement("div", { className: "scenario-label", style: { marginTop: 8 } }, "Your analysis (think before revealing)"),
      React.createElement("textarea", {
        className: "scenario-thinking",
        style: { "--mc": moduleColor },
        placeholder: "Write your analysis here using course concepts\u2026",
        value: notes[index] || "",
        onChange: (e) => setNotes(n => ({...n, [index]: e.target.value}))
      }),
      !revealed[index]
        ? React.createElement("button", { className: "btn accent", style: { alignSelf: "center", "--mc": moduleColor, background: moduleColor, color: "#0f172a", borderColor: moduleColor }, onClick: () => setRevealed(r => ({...r, [index]: true})) }, "Reveal Model Answer")
        : React.createElement("div", { className: "model-answer" },
            React.createElement("div", { className: "model-answer-title" }, "Model Answer"),
            React.createElement("p", null, current.answer),
            current.concepts && React.createElement("p", { style: { marginTop: 8, fontSize: 12, color: "#64748b", fontFamily: "'JetBrains Mono', monospace" } }, "Key concepts: " + current.concepts.join(", "))
          )
    ),
    React.createElement("div", { className: "nav-row" },
      React.createElement("button", { className: "btn", disabled: index === 0, onClick: () => go(-1) }, "\u2190 Prev"),
      React.createElement("button", { className: "btn", disabled: index === scenarios.length - 1, onClick: () => go(1) }, "Next \u2192")
    )
  );
}

// ─── RESET MODAL ───
function ResetModal({ onConfirm, onCancel }) {
  return React.createElement("div", { className: "modal-overlay", onClick: onCancel },
    React.createElement("div", { className: "modal-box", onClick: e => e.stopPropagation() },
      React.createElement("h3", null, "\u26a0\ufe0f Reset All Progress?"),
      React.createElement("p", null, "Are you sure you want to reset your progress? All your study progress across every module will be permanently lost."),
      React.createElement("div", { className: "modal-buttons" },
        React.createElement("button", { className: "btn cancel", onClick: onCancel }, "Cancel"),
        React.createElement("button", { className: "btn danger", onClick: onConfirm }, "Yes, Reset Everything")
      )
    )
  );
}

// ─── COURSE SELECTOR ───
function CourseSelector({ onSelect }) {
  const courseKeys = Object.keys(COURSES);
  return React.createElement("div", { className: "course-select" },
    React.createElement("h1", null, "Study Tool"),
    React.createElement("p", null, "Select a course to study"),
    React.createElement("div", { className: "course-grid" },
      courseKeys.map(key => {
        const c = COURSES[key];
        const totalFC = c.modules.reduce((s, m) => s + m.flashcards.length, 0);
        const totalTF = c.modules.reduce((s, m) => s + m.trueFalse.length, 0);
        // Calculate overall progress for this course
        let studied = 0;
        c.modules.forEach(m => {
          const fcStatus = loadData(c.storagePrefix + m.id + "_fc_status", {});
          studied += Object.keys(fcStatus).length;
        });
        const pct = totalFC > 0 ? Math.round((studied / totalFC) * 100) : 0;
        return React.createElement("div", {
          key: key, className: "course-card", style: { "--cc": c.color },
          onClick: () => onSelect(key)
        },
          React.createElement("div", { className: "course-code" }, c.code),
          React.createElement("div", { className: "course-name" }, c.name),
          React.createElement("div", { className: "course-stats" },
            `${totalFC} cards \u00b7 ${totalTF} T/F`
          ),
          totalFC > 1 && React.createElement("div", { style: { width: "100%", height: 4, background: "#334155", borderRadius: 2, marginTop: 4 } },
            React.createElement("div", { style: { width: `${pct}%`, height: "100%", background: c.color, borderRadius: 2, transition: "width 0.3s" } })
          )
        );
      })
    )
  );
}

// ─── STUDY VIEW (formerly App) ───
function StudyView({ courseKey, onBack }) {
  const course = COURSES[courseKey];
  const MODULES = course.modules;
  const prefix = course.storagePrefix;

  const [activeModule, setActiveModule] = useState(0);
  const [mode, setMode] = useState("flashcards");
  const [showResetModal, setShowResetModal] = useState(false);
  const [resetCounter, setResetCounter] = useState(0);

  const mod = MODULES[activeModule];
  const hasTF = mod.trueFalse.length > 0;
  const hasScenarios = (mod.scenarios || []).length > 0;

  useEffect(() => {
    if (!hasTF && mode === "quiz") setMode("flashcards");
    if (!hasScenarios && mode === "scenarios") setMode("flashcards");
  }, [activeModule, hasTF, hasScenarios, mode]);

  const progress = MODULES.map(m => {
    const fcStatus = loadData(prefix + m.id + "_fc_status", {});
    const tfAnswers = loadData(prefix + m.id + "_tf_answers", {});
    const fcTotal = m.flashcards.length;
    const fcGot = Object.values(fcStatus).filter(v => v === "got").length;
    const fcReview = Object.values(fcStatus).filter(v => v === "review").length;
    const fcUnseen = fcTotal - fcGot - fcReview;
    const tfTotal = m.trueFalse.length;
    const tfAnswered = Object.keys(tfAnswers).length;
    const tfCorrect = Object.entries(tfAnswers).filter(([i, v]) => m.trueFalse[parseInt(i)]?.ans === v).length;
    return { fcTotal, fcGot, fcReview, fcUnseen, tfTotal, tfAnswered, tfCorrect };
  });

  const curProg = progress[activeModule];

  const handleReset = () => {
    MODULES.forEach(m => {
      clearData(prefix + m.id + "_fc_status");
      clearData(prefix + m.id + "_tf_answers");
      clearData(prefix + m.id + "_sc_progress");
    });
    setShowResetModal(false);
    setResetCounter(c => c + 1);
  };

  const cssVars = { "--mc": mod.color, "--mc08": mod.color + "12", "--mc15": mod.color + "25" };

  return React.createElement("div", { style: cssVars },
    React.createElement("button", { className: "back-btn", onClick: onBack }, "\u2190 All Courses"),
    showResetModal && React.createElement(ResetModal, { onConfirm: handleReset, onCancel: () => setShowResetModal(false) }),
    React.createElement("div", { className: "header" },
      React.createElement("h1", null, `${course.code} Study Tool`),
      React.createElement("p", null, `${course.name}${course.prof ? " \u00b7 " + course.prof : ""}`)
    ),
    React.createElement("div", { className: "tabs" },
      MODULES.map((m, i) => React.createElement("button", {
        key: m.id, className: `tab${activeModule === i ? " active" : ""}`,
        style: activeModule === i ? { borderColor: m.color, color: m.color, background: m.color + "15", "--mc": m.color, "--mc15": m.color + "25" } : {},
        onClick: () => setActiveModule(i)
      }, `${m.label}: ${m.subtitle}`))
    ),
    React.createElement("div", { className: "study-progress" },
      React.createElement("div", { className: "study-progress-label" },
        React.createElement("span", null, "Flashcard Progress"),
        React.createElement("span", null, `${curProg.fcGot + curProg.fcReview}/${curProg.fcTotal} cards studied`)
      ),
      React.createElement("div", { className: "study-progress-bar" },
        React.createElement("div", { className: "seg-got", style: { width: `${(curProg.fcGot / curProg.fcTotal) * 100}%` } }),
        React.createElement("div", { className: "seg-review", style: { width: `${(curProg.fcReview / curProg.fcTotal) * 100}%` } }),
        React.createElement("div", { className: "seg-unseen", style: { width: `${(curProg.fcUnseen / curProg.fcTotal) * 100}%` } })
      ),
      React.createElement("div", { className: "study-progress-legend" },
        React.createElement("span", null, React.createElement("span", { className: "legend-dot", style: { background: "#22c55e" } }), `Got it (${curProg.fcGot})`),
        React.createElement("span", null, React.createElement("span", { className: "legend-dot", style: { background: "#f59e0b" } }), `Review (${curProg.fcReview})`),
        React.createElement("span", null, React.createElement("span", { className: "legend-dot", style: { background: "#334155" } }), `Unseen (${curProg.fcUnseen})`)
      ),
      hasTF && React.createElement("div", { style: { marginTop: 16 } },
        React.createElement("div", { className: "study-progress-label" },
          React.createElement("span", null, "T/F Quiz Progress"),
          React.createElement("span", null, curProg.tfAnswered > 0 ? `${curProg.tfCorrect}/${curProg.tfAnswered} correct (${Math.round(curProg.tfCorrect/curProg.tfAnswered*100)}%)` : "Not started")
        ),
        React.createElement("div", { className: "study-progress-bar" },
          React.createElement("div", { className: "seg-got", style: { width: `${(curProg.tfCorrect / curProg.tfTotal) * 100}%` } }),
          React.createElement("div", { className: "seg-review", style: { width: `${((curProg.tfAnswered - curProg.tfCorrect) / curProg.tfTotal) * 100}%` } }),
          React.createElement("div", { className: "seg-unseen", style: { width: `${((curProg.tfTotal - curProg.tfAnswered) / curProg.tfTotal) * 100}%` } })
        ),
        React.createElement("div", { className: "study-progress-legend" },
          React.createElement("span", null, React.createElement("span", { className: "legend-dot", style: { background: "#22c55e" } }), `Correct (${curProg.tfCorrect})`),
          React.createElement("span", null, React.createElement("span", { className: "legend-dot", style: { background: "#f59e0b" } }), `Incorrect (${curProg.tfAnswered - curProg.tfCorrect})`),
          React.createElement("span", null, React.createElement("span", { className: "legend-dot", style: { background: "#334155" } }), `Remaining (${curProg.tfTotal - curProg.tfAnswered})`)
        )
      )
    ),
    React.createElement("div", { className: "mode-toggle" },
      React.createElement("button", { className: `mode-btn${mode === "flashcards" ? " active" : ""}`, style: mode === "flashcards" ? { background: mod.color, color: "#0f172a" } : {}, onClick: () => setMode("flashcards") }, "Flashcards"),
      hasTF && React.createElement("button", { className: `mode-btn${mode === "quiz" ? " active" : ""}`, style: mode === "quiz" ? { background: mod.color, color: "#0f172a" } : {}, onClick: () => setMode("quiz") }, "T/F Quiz"),
      hasScenarios && React.createElement("button", { className: `mode-btn${mode === "scenarios" ? " active" : ""}`, style: mode === "scenarios" ? { background: mod.color, color: "#0f172a" } : {}, onClick: () => setMode("scenarios") }, "Scenarios"),
      React.createElement("button", { className: "mode-btn", style: { color: "#ef4444", fontSize: 12 }, onClick: () => setShowResetModal(true) }, "\u21bb Reset Progress")
    ),
    React.createElement("div", { className: "content" },
      mode === "flashcards"
        ? React.createElement(FlashcardMode, { key: prefix + mod.id + "-fc-" + resetCounter, cards: mod.flashcards, moduleColor: mod.color, moduleId: prefix + mod.id })
        : mode === "quiz"
        ? React.createElement(TFMode, { key: prefix + mod.id + "-tf-" + resetCounter, questions: mod.trueFalse, moduleColor: mod.color, moduleId: prefix + mod.id })
        : React.createElement(ScenarioMode, { key: prefix + mod.id + "-sc-" + resetCounter, scenarios: mod.scenarios || [], moduleColor: mod.color, moduleId: prefix + mod.id })
    )
  );
}

// ─── APP (Router) ───
function App() {
  const [activeCourse, setActiveCourse] = useState(null);

  if (!activeCourse) {
    return React.createElement(CourseSelector, { onSelect: setActiveCourse });
  }

  return React.createElement(StudyView, {
    key: activeCourse,
    courseKey: activeCourse,
    onBack: () => setActiveCourse(null)
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
